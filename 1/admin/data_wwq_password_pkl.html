<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilai1 Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:#0d0f14; --surface:#161922; --s2:#1e2230; --border:#252b3b;
  --a1:#4f9cf9; --a3:#34d399; --text:#e2e8f0; --muted:#64748b; --danger:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* LOGIN */
#loginSection{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 30% 40%,#1a1040 0%,var(--bg) 65%);}
.login-box{width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.login-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;}
.login-logo span{color:var(--a1);}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
.server-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:8px;}
.server-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:20px;}
.srv-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:10px 0;font-size:14px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;transition:all .2s;text-align:center;}
.srv-btn:hover{border-color:var(--a1);color:var(--text);}
.srv-btn.active{background:rgba(79,156,249,.15);border-color:var(--a1);color:var(--a1);font-weight:700;}
.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px;}
.inp{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;transition:border-color .2s;}
.inp:focus{outline:none;border-color:var(--a1);}
.fg{margin-bottom:16px;}
.btn-login{width:100%;padding:12px;background:var(--a1);color:#000;font-weight:700;font-size:14px;border:none;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;margin-top:8px;transition:opacity .2s;}
.btn-login:hover{opacity:.85;}
.login-err{background:rgba(248,113,113,.12);border:1px solid var(--danger);color:var(--danger);font-size:13px;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;}

/* APP SHELL */
#appSection{display:none;height:100vh;flex-direction:column;}
.topbar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;flex-shrink:0;}
.brand span{color:var(--a1);}
.srv-switcher{display:flex;align-items:center;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none;padding:0 4px;}
.srv-switcher::-webkit-scrollbar{display:none;}
.srv-chip{background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:3px 11px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.srv-chip:hover{border-color:var(--a1);color:var(--text);}
.srv-chip.active{background:rgba(79,156,249,.15);border-color:var(--a1);color:var(--a1);font-weight:600;}
.srv-dot{width:6px;height:6px;border-radius:50%;background:var(--a3);display:inline-block;margin-right:4px;flex-shrink:0;}
.topbar-right{margin-left:auto;display:flex;gap:8px;flex-shrink:0;}
.btn-icon{background:var(--s2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .2s;}
.btn-icon:hover{border-color:var(--danger);color:var(--danger);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.tbl-badge{font-family:'DM Mono',monospace;font-size:12px;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--a1);}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;}
.btn-o:hover{border-color:var(--a1);color:var(--a1);}
.search-wrap{margin-left:auto;position:relative;}
.search-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;}
.search-inp{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 10px 6px 28px;font-size:12px;width:200px;font-family:inherit;transition:border-color .2s;}
.search-inp:focus{outline:none;border-color:var(--a1);}

.table-wrap{flex:1;overflow:auto;padding:12px 16px;}
.table-wrap::-webkit-scrollbar{width:5px;height:5px;}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{position:sticky;top:0;background:var(--s2);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;z-index:2;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s;}
tbody tr:hover{background:var(--s2);}
tbody td{padding:8px 10px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-id{font-family:'DM Mono',monospace;color:var(--muted);font-size:11px;}
.td-bio{max-width:320px;white-space:normal;line-height:1.5;}
.td-bio b{color:var(--text);}
.td-bio .bio-line{display:block;font-size:11.5px;color:var(--muted);}
.td-bio .bio-line b{color:var(--a1);font-weight:600;}
.td-jwb{max-width:420px;font-family:'DM Mono',monospace;font-size:11px;white-space:normal;word-break:break-all;color:var(--text);}
.td-jwb .ans-b{color:#34d399;}
.td-jwb .ans-a{color:#fbbf24;}
.td-jwb .num{color:var(--muted);}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state i{font-size:36px;margin-bottom:10px;display:block;opacity:.2;}
.loading-txt{text-align:center;padding:40px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;}
.loading-txt::after{content:'...';animation:dots 1.2s steps(3) infinite;}
@keyframes dots{0%{content:'.';}33%{content:'..';}66%{content:'...'}}

@media(max-width:768px){
  .topbar{padding:0 12px;gap:8px;}
  .toolbar{padding:8px 10px;gap:6px;}
  .search-wrap{margin-left:0;width:100%;order:10;}
  .search-inp{width:100%;}
  .login-box{width:92vw;padding:28px 20px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginSection">
  <div class="login-box">
    <div class="login-logo">Nilai1<span>Viewer</span></div>
    <div class="login-sub">Pilih server lalu masuk</div>
    <span class="server-label">Server</span>
    <div class="server-grid" id="loginServerGrid"></div>
    <form id="loginForm">
      <div class="fg"><label class="lbl">Username</label><input id="uname" type="text" class="inp" placeholder="Username" required autofocus autocomplete="username"></div>
      <div class="fg"><label class="lbl">Password</label><input id="upass" type="password" class="inp" placeholder="••••••" required autocomplete="current-password"></div>
      <button type="submit" class="btn-login" id="btnLogin">MASUK</button>
      <div id="loginErr" class="login-err"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="appSection">
  <div class="topbar">
    <div class="brand">Nilai1<span>Viewer</span></div>
    <div class="srv-switcher" id="topbarServerSwitcher"></div>
    <div class="topbar-right">
      <span id="userLabel" style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;"></span>
      <button class="btn-icon" onclick="logout()" title="Keluar"><i class="fa fa-sign-out-alt"></i></button>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="tbl-badge" id="tblBadge">nilai1_json</div>
      <button class="btn-o" onclick="loadData()"><i class="fa fa-rotate-right"></i> Refresh</button>
      <div class="search-wrap">
        <i class="fa fa-search"></i>
        <input type="text" id="searchBox" class="search-inp" placeholder="Cari x_01...">
      </div>
    </div>
    <div class="table-wrap" id="tableWrap">
      <div class="empty-state"><i class="fa fa-spinner"></i><p>Memuat...</p></div>
    </div>
  </div>
</div>

<script>
// ── localStorage helpers ──
const sg = k=>{try{return localStorage.getItem(k);}catch(e){return null;}};
const ss = (k,v)=>{try{localStorage.setItem(k,v);}catch(e){}};
const sr = k=>{try{localStorage.removeItem(k);}catch(e){}};

// ══════════════════════════════════════════════════════════
//  SERVER LIST — tambah / kurangi domain di sini
// ══════════════════════════════════════════════════════════
const SERVERS = [
  { label: 'Lidan',     domain: 'lidan-co-id.pages.dev' },
  { label: 'Tabi',      domain: 'tabi.my.id'             },
  { label: 'Mobeli',    domain: 'mobeli.my.id'           },
  { label: 'TalentMap', domain: 'talentmap.my.id'        },
];

// Database General (satu-satunya yang dipakai) + tabel target (tetap)
const DB_PATH   = '/api/contacts_filter_dinamis6';
const DB_AUTH   = 'admin';
const TABLE     = 'nilai1_json';

let activeServerIdx = parseInt(sg('activeServerIdx')||'0');
if(!(activeServerIdx >= 0 && activeServerIdx < SERVERS.length)) activeServerIdx = 0;

function apiUrl(){
  return `https://${SERVERS[activeServerIdx].domain}${DB_PATH}`;
}
function hdrs(){
  return { 'Content-Type':'application/json', 'X-Custom-Auth': DB_AUTH };
}

// ── Render tombol server di login ──
function renderLoginServers(){
  document.getElementById('loginServerGrid').innerHTML = SERVERS.map((s,i)=>`
    <button type="button" class="srv-btn${i===activeServerIdx?' active':''}"
      onclick="switchServer(${i})" title="${s.label} — https://${s.domain}">
      ${i===activeServerIdx?'✓ ':''}${i+1}
    </button>
  `).join('');
}
// ── Render chip server di topbar ──
function renderTopbarServers(){
  document.getElementById('topbarServerSwitcher').innerHTML = SERVERS.map((s,i)=>`
    <button class="srv-chip${i===activeServerIdx?' active':''}"
      onclick="switchServer(${i})" title="${s.label} — https://${s.domain}">
      <span class="srv-dot"></span>${i+1}
    </button>
  `).join('');
}
function switchServer(idx){
  if(idx === activeServerIdx) return;
  activeServerIdx = idx;
  ss('activeServerIdx', idx);
  renderLoginServers();
  renderTopbarServers();
  if(document.getElementById('appSection').style.display === 'flex'){
    loadData();
  }
}
renderLoginServers();

// ── AUTH ── (login cek tabel 'users' di General: x_01=username, x_02=password)
document.getElementById('loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const username = document.getElementById('uname').value.trim();
  const password = document.getElementById('upass').value;
  const errEl = document.getElementById('loginErr');
  const btnEl = document.getElementById('btnLogin');
  errEl.style.display='none';
  btnEl.textContent='Memeriksa...'; btnEl.disabled=true;
  try{
    const url = `${apiUrl()}?table=users&x_01_eq=${encodeURIComponent(username)}&x_02_eq=${encodeURIComponent(password)}`;
    const res = await fetch(url, { headers: hdrs() });
    const data = await res.json();
    if(data.data && data.data.length > 0){
      ss('loggedIn','true');
      ss('loggedUser', username);
      showApp();
    } else {
      errEl.textContent = 'Username atau password salah.';
      errEl.style.display='block';
    }
  } catch(err){
    errEl.textContent = 'Gagal terhubung ke server.';
    errEl.style.display='block';
  } finally {
    btnEl.textContent='MASUK'; btnEl.disabled=false;
  }
});
function logout(){ sr('loggedIn'); sr('loggedUser'); location.reload(); }

window.addEventListener('DOMContentLoaded', ()=>{ if(sg('loggedIn')==='true') showApp(); });

function showApp(){
  document.getElementById('loginSection').style.display='none';
  const app = document.getElementById('appSection');
  app.style.display='flex'; app.style.flexDirection='column';
  renderTopbarServers();
  document.getElementById('userLabel').textContent = sg('loggedUser') || '';
  document.getElementById('searchBox').addEventListener('input', ()=>{
    clearTimeout(searchTimer); searchTimer=setTimeout(loadData,450);
  });
  loadData();
}

// ── LOAD DATA (lazy load / infinite scroll, sama seperti versi asli) ──
const PAGE_SIZE = 100;
let lazyOffset=0, lazyTotal=null, lazyLoading=false, lazySeenIds=new Set();
let searchTimer=null, lazyObserver=null;

async function loadData(){
  lazyOffset=0; lazyTotal=null; lazyLoading=false; lazySeenIds=new Set();
  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '<div class="loading-txt">Memuat data</div>';

  const firstBatch = await fetchPage(0);
  if(firstBatch === null){
    wrap.innerHTML = '<div class="empty-state"><i class="fa fa-plug"></i><p>Gagal memuat data</p></div>';
    return;
  }
  if(!firstBatch.data || firstBatch.data.length === 0){
    wrap.innerHTML = '<div class="empty-state"><i class="fa fa-inbox"></i><p>Tidak ada data</p></div>';
    return;
  }

  lazyTotal  = firstBatch.total ?? null;
  lazyOffset = firstBatch.data.length;

  wrap.innerHTML = buildTableShell();
  appendRows(firstBatch.data);
  attachObserver();
}

async function fetchPage(offset){
  const q = document.getElementById('searchBox').value;
  let url = `${apiUrl()}?table=${TABLE}&limit=${PAGE_SIZE}&offset=${offset}`;
  if(q) url += `&x_01_like=${encodeURIComponent(q)}`;
  try{
    const res = await fetch(url, { headers: hdrs() });
    return await res.json();
  } catch(e){ return null; }
}

function buildTableShell(){
  let h = '<table id="dataTable"><thead><tr>';
  h += '<th>ID</th><th>x_01</th><th>Bio</th><th>Jawaban (x_07)</th>';
  h += '</tr></thead><tbody id="dataTbody"></tbody></table>';
  h += '<div id="lazySentinel" style="height:1px;"></div>';
  h += '<div id="lazySpinner" style="display:none;text-align:center;padding:14px;color:var(--muted);font-family:monospace;font-size:12px;">Memuat lebih...</div>';
  return h;
}

// ── Helper: parse bio singkat dari x_02 (JSON biodata CPMI) ──
function parseBio(x02){
  if(!x02) return '<span style="color:var(--muted)">—</span>';
  let obj;
  try { obj = JSON.parse(x02); } catch(e) { return escapeHtml(String(x02)); }
  const nama  = obj.bioNama || obj.nama || '—';
  const usia  = obj.bioUsia || obj.usia || '—';
  const pend  = parseRiwayatPendidikan(obj.riwayatPendidikan) || obj.bioPend || obj.pendidikan || '—';
  return `<span class="bio-line"><b>Nama:</b> ${escapeHtml(nama)}</span>`
       + `<span class="bio-line"><b>Usia:</b> ${escapeHtml(usia)}</span>`
       + `<span class="bio-line"><b>Pendidikan:</b> ${pend}</span>`;
}

// ── Helper: parse riwayatPendidikan (array of {lembaga,jurusan,lokasi,periode,keterangan}) ──
// jadi format lengkap: "lembaga - jurusan - periode" (gabung "; " jika lebih dari 1 entri)
function parseRiwayatPendidikan(arr){
  if(!Array.isArray(arr) || arr.length === 0) return null;
  return arr.map(item=>{
    const lembaga = item.lembaga || '—';
    const jurusan = item.jurusan || '—';
    const periode = item.periode || '—';
    return escapeHtml(`${lembaga} - ${jurusan} - ${periode}`);
  }).join('; ');
}


function parseJawaban(x07){
  if(!x07) return '<span style="color:var(--muted)">—</span>';
  let obj;
  try { obj = JSON.parse(x07); } catch(e) { return escapeHtml(String(x07)); }
  const firstKey = Object.keys(obj)[0];
  if(!firstKey) return '<span style="color:var(--muted)">—</span>';
  const raw = String(obj[firstKey]);
  const items = raw.split(';').map(v=>v.trim()).filter(v=>v !== '');
  if(items.length === 0) return '<span style="color:var(--muted)">—</span>';
  return items.map((v,i)=>{
    const cls = v.toUpperCase()==='B' ? 'ans-b' : (v.toUpperCase()==='A' ? 'ans-a' : '');
    return `<span class="num">${i+1}.</span><span class="${cls}">${escapeHtml(v)}</span> `;
  }).join('');
}

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function appendRows(rows){
  const tbody = document.getElementById('dataTbody');
  if(!tbody) return 0;
  let added = 0;
  rows.forEach(row=>{
    if(lazySeenIds.has(row.id_x)) return;
    lazySeenIds.add(row.id_x);
    added++;
    const tr = document.createElement('tr');
    let cells = `<td class="td-id">${row.id_x}</td>`;
    cells += `<td>${escapeHtml(row.x_01||'')}</td>`;
    cells += `<td class="td-bio">${parseBio(row.x_02)}</td>`;
    cells += `<td class="td-jwb">${parseJawaban(row.x_07)}</td>`;
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });
  updateBadge();
  return added;
}

function updateBadge(){
  const tbody = document.getElementById('dataTbody');
  const count = tbody ? tbody.querySelectorAll('tr').length : 0;
  const total = lazyTotal !== null ? ` / ${lazyTotal}` : '';
  document.getElementById('tblBadge').textContent = `nilai1_json (${count}${total})`;
}

function attachObserver(){
  if(lazyObserver) lazyObserver.disconnect();
  const sentinel = document.getElementById('lazySentinel');
  if(!sentinel) return;
  lazyObserver = new IntersectionObserver(async entries=>{
    if(!entries[0].isIntersecting) return;
    if(lazyLoading) return;
    if(lazyTotal !== null && lazyOffset >= lazyTotal) return;

    lazyLoading = true;
    const spinner = document.getElementById('lazySpinner');
    if(spinner) spinner.style.display = 'block';

    const batch = await fetchPage(lazyOffset);
    lazyLoading = false;
    if(spinner) spinner.style.display = 'none';

    if(!batch || !batch.data || batch.data.length === 0){
      lazyObserver.disconnect(); return;
    }
    lazyTotal = batch.total ?? lazyTotal;
    lazyOffset += batch.data.length;
    const added = appendRows(batch.data);

    if(lazyTotal !== null && lazyOffset >= lazyTotal){ lazyObserver.disconnect(); return; }
    if(lazyTotal === null && batch.data.length < PAGE_SIZE){ lazyObserver.disconnect(); return; }
    if(added === 0){ lazyObserver.disconnect(); }
  }, { rootMargin: '200px' });
  lazyObserver.observe(sentinel);
}
</script>
</body>
</html>
