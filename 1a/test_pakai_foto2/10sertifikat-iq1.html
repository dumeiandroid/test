<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sertifikat IQ – Lidan Psikologi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Great+Vibes&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;font-family:'EB Garamond',serif}
#ls{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
#ls p{color:#D4AF37;font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px}
.sp{width:36px;height:36px;border:2px solid #222;border-top-color:#D4AF37;border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#ls.hidden{display:none}
.pbar{display:flex;gap:12px;margin-bottom:28px}
.pb{padding:10px 28px;border:none;border-radius:2px;font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.pb1{background:linear-gradient(135deg,#8B6914,#D4AF37,#f0d060,#D4AF37,#8B6914);color:#0f0a00;box-shadow:0 2px 14px rgba(212,175,55,.35)}
.pb1:hover{transform:translateY(-1px);box-shadow:0 4px 22px rgba(212,175,55,.45)}
.pb2{background:transparent;color:#666;border:1px solid #333}
.pb2:hover{color:#aaa}

/* ══════════════════════════
   SERTIFIKAT
══════════════════════════ */
.cert{
  width:820px;
  position:relative;
  background:#ffffff;
  box-shadow:0 16px 60px rgba(0,0,0,.7),0 2px 12px rgba(0,0,0,.4);
  overflow:hidden;
}

/* ── LAYER 1: bg putih sudah dari .cert ── */

/* Watermark logo */
.cert-watermark{
  position:absolute;inset:0;z-index:1;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.cert-watermark img{
  width:300px;height:300px;object-fit:contain;
  opacity:.05;
}

/* ── LAYER 2: Poligon gelap kiri atas & kanan bawah ── */
.geo-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:2;pointer-events:none;
}

/* ── LAYER 3: Garis emas & dots ── */
.deco-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:3;pointer-events:none;
}

/* ── LAYER 4: Border emas ── */
.border-frame{
  position:absolute;inset:10px;
  border:1.5px solid #D4AF37;
  z-index:4;pointer-events:none;
}

/* ── LAYER 5: Konten ── */
.cert-body{position:relative;z-index:5;padding:44px 64px 36px}

/* Header */
.hdr{display:flex;align-items:center;gap:18px;margin-bottom:18px}
.logo{
  width:72px;height:72px;border-radius:50%;
  border:2px solid #D4AF37;object-fit:cover;flex-shrink:0;
  box-shadow:0 0 0 4px rgba(212,175,55,.12),0 2px 10px rgba(0,0,0,.15);
}
.t1{
  font-family:'Cinzel',serif;font-size:30px;font-weight:900;
  color:#1A1A1A;letter-spacing:3px;line-height:1;
}
.t2{
  font-family:'Cinzel',serif;font-size:9.5px;font-weight:600;
  letter-spacing:7px;color:#888;margin-top:6px;
}

/* Divider emas */
.gd{display:flex;align-items:center;gap:12px;margin:0 0 18px}
.gl{flex:1;height:1px;background:linear-gradient(90deg,transparent,#D4AF37 30%,#D4AF37 70%,transparent)}
.gd-icon{width:8px;height:8px;background:#D4AF37;transform:rotate(45deg);flex-shrink:0}

/* Kepada */
.cert-foto-wrap{text-align:center;}
.cert-foto-wrap .qrb img,
.cert-foto-wrap img{width:96px;height:96px;object-fit:cover;object-position:center top;border:none;border-radius:0;box-shadow:none;display:block;}
.cert-foto-placeholder{width:96px;height:96px;border:1.5px dashed #D4AF37;display:inline-flex;align-items:center;justify-content:center;color:#D4AF37;font-size:9px;text-align:center;line-height:1.4;font-family:'Cinzel',serif;letter-spacing:1px;}
.cert-foto-label{font-family:'Cinzel',serif;font-size:7px;color:#888;text-align:center;margin-top:4px;letter-spacing:2px;}
/* fix: foto wrap pakai class .sel */
.sel img{width:96px!important;height:96px!important;object-fit:cover!important;object-position:center top!important;display:block!important;}
.kpd{
  text-align:center;font-family:'Cinzel',serif;
  font-size:9px;font-weight:600;letter-spacing:5px;
  color:#888;text-transform:uppercase;margin-bottom:6px;
}
/* Nama */
.nama{
  text-align:center;font-family:'Great Vibes',cursive;
  font-size:62px;color:#1A1A1A;line-height:1.1;margin-bottom:6px;
}
/* Sub */
.sub{
  text-align:center;font-family:'EB Garamond',serif;
  font-size:14px;color:#555;font-style:italic;letter-spacing:.3px;margin-bottom:8px;
}
/* Score */
.skor{
  text-align:center;font-family:'Cinzel',serif;
  font-size:20px;font-weight:600;color:#1A1A1A;letter-spacing:2px;
}
.skor .sv{color:#D4AF37;font-weight:900;font-size:24px}

/* Footer */
.ftr{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-top:4px}

/* ── LAYER 6: QR ── */
.qrw{flex-shrink:0;position:relative;z-index:6}
.qrb{padding:5px;border:1.5px solid #D4AF37;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
#qr canvas,#qr img{display:block}
.qrl{font-family:'Cinzel',serif;font-size:7px;color:#888;text-align:center;margin-top:4px;letter-spacing:2px}

/* TTD z5 */
.ttd{flex:1;text-align:center;z-index:5;display:flex;flex-direction:column;align-items:center;gap:1px}
.tgl{font-family:'EB Garamond',serif;font-size:13px;color:#444;letter-spacing:.4px}
.psi{font-family:'Cinzel',serif;font-size:9.5px;font-weight:600;color:#888;letter-spacing:3px}
.tw{position:relative;width:160px;height:100px;display:flex;align-items:center;justify-content:center}
.ti{position:absolute;left:50%;transform:translateX(-50%);height:68px;max-width:160px;object-fit:contain;z-index:5}
.si{position:absolute;left:50%;transform:translateX(-50%);width:92px;height:92px;object-fit:contain;z-index:5;opacity:.88}
.tln{width:100%;max-width:230px;height:1px;background:linear-gradient(90deg,transparent,#D4AF37,transparent);margin:3px auto}
.tn{font-family:'Cinzel',serif;font-size:9.5px;font-weight:600;color:#1A1A1A;letter-spacing:.3px}
.ts{font-family:'EB Garamond',serif;font-size:11px;color:#888;margin-top:1px}

/* Segel z5 */
.sel{flex-shrink:0;width:80px;text-align:center;z-index:5}

@media(max-width:880px){.cert{width:100%}.cert-body{padding:28px 22px}.nama{font-size:38px}.t1{font-size:20px}}
</style>
</head>
<body>

<div id="ls"><div class="sp"></div><p>Memuat Sertifikat</p></div>

<div class="pbar">
  <button class="pb pb1" id="btn-jpg">&#8681; Download JPG</button>
  <button class="pb pb2" onclick="history.back()">&#8592; Kembali</button>
</div>

<div class="cert" id="certEl">

  <!-- LAYER 1: Watermark logo -->
  <div class="cert-watermark">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <img src="https://psikogram.lidan.co.id/gambar/logo1.png" alt="" id="wm-img">
      <div id="wm-teks" style="display:none;font-family:'Cinzel',serif;font-weight:700;letter-spacing:3px;text-align:center;line-height:1.4;"></div>
    </div>
  </div>

  <!-- LAYER 2: Poligon gelap — digambar via JS agar presisi dengan ukuran nyata -->
  <svg class="geo-svg" id="geoSvg" xmlns="http://www.w3.org/2000/svg">
    <!-- Kiri bawah -->
    <polygon id="tl1" fill="#1A1A1A"/>
    <polygon id="tl2" fill="#2C2C2C"/>
    <polygon id="tl3" fill="#3A3A3A"/>
    <polygon id="tl4" fill="#4A4A4A"/>

    <!-- Kanan atas -->
    <polygon id="br1" fill="#1A1A1A"/>
    <polygon id="br2" fill="#2C2C2C"/>
    <polygon id="br3" fill="#3A3A3A"/>
    <polygon id="br4" fill="#4A4A4A"/>
  </svg>

  <!-- LAYER 3: Garis emas diagonal & dots -->
  <svg class="deco-svg" id="decoSvg" xmlns="http://www.w3.org/2000/svg">
    <!-- Garis emas kiri atas -->
    <line id="tl-line1" stroke="#D4AF37" stroke-width="1.5" opacity=".9"/>
    <line id="tl-line2" stroke="#D4AF37" stroke-width=".6" opacity=".5"/>
    <!-- Garis emas kanan bawah -->
    <line id="br-line1" stroke="#D4AF37" stroke-width="1.5" opacity=".9"/>
    <line id="br-line2" stroke="#D4AF37" stroke-width=".6" opacity=".5"/>
    <!-- Dot pattern kanan bawah — digambar JS -->
    <g id="dotGroup" opacity=".55"/>
  </svg>

  <!-- LAYER 4: Border -->
  <div class="border-frame"></div>

  <!-- LAYER 5: Konten -->
  <div class="cert-body">
    <div class="hdr">
      <img src="https://psikogram.lidan.co.id/gambar/logo1.png" alt="Logo" class="logo" onerror="this.style.display='none'">
      <div>
        <div class="t1">Intelligence Quotient</div>
        <div class="t2">Certificate of Achievement</div>
      </div>
    </div>

    <div class="gd">
      <div class="gl"></div><div class="gd-icon"></div>
      <div class="gl"></div><div class="gd-icon"></div>
      <div class="gl"></div>
    </div>

    <div class="kpd">Diberikan Kepada</div>
    <div class="nama" id="cert-nama">—</div>
    <div class="sub">Telah mengikuti Tes Inteligensi / IQ di Lidan Psikologi</div>
    <div class="skor">Score IQ &nbsp;=&nbsp; <span class="sv" id="cert-sv">—</span></div>

    <div class="gd" style="margin-top:16px;margin-bottom:0">
      <div class="gl"></div><div class="gd-icon"></div>
      <div class="gl"></div><div class="gd-icon"></div>
      <div class="gl"></div>
    </div>

    <div class="ftr">
      <!-- LAYER 6: QR -->
      <div class="qrw">
        <div class="qrb"><div id="qr"></div></div>
        <div class="qrl">Verifikasi</div>
      </div>

      <!-- LAYER 5: TTD -->
      <div class="ttd">
        <div class="tgl" id="cert-tgl">—</div>
        <div class="psi">Psikolog</div>
        <div class="tw">
          <img src="https://psikogram.lidan.co.id/gambar/ttd.png" alt="TTD" class="ti" onerror="this.style.visibility='hidden'">
          <img src="https://psikogram.lidan.co.id/gambar/stempel.png" alt="Stempel" class="si" onerror="this.style.display='none'">
        </div>
        <div class="tln"></div>
        <div class="tn" id="nama-psikolog">—</div>
        <div class="ts" id="nomor-sipp">—</div>
      </div>

      <!-- Foto Peserta -->
      <div class="sel" id="cert-foto-wrap" style="width:80px;"></div>
    </div>
  </div>
</div>

<script>
/* ── Gambar geometri setelah layout selesai ── */
function drawGeo(){
  const el=document.getElementById('certEl');
  const W=el.offsetWidth, H=el.offsetHeight;
  const gSvg=document.getElementById('geoSvg');
  const dSvg=document.getElementById('decoSvg');
  gSvg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  dSvg.setAttribute('viewBox',`0 0 ${W} ${H}`);

  const S=220; // ukuran poligon utama
  const offsets=[0,28,52,72]; // offset untuk efek berlapis
  const ids_tl=['tl1','tl2','tl3','tl4'];
  const ids_br=['br1','br2','br3','br4'];

  ids_tl.forEach((id,i)=>{
    const o=offsets[i];
    // Kiri bawah: segitiga dari sudut kiri bawah
    document.getElementById(id).setAttribute('points',
      `0,${H} ${S-o},${H} 0,${H-(S-o)}`);
  });

  ids_br.forEach((id,i)=>{
    const o=offsets[i];
    // Kanan atas: segitiga dari sudut kanan atas
    document.getElementById(id).setAttribute('points',
      `${W},0 ${W-(S-o)},0 ${W},${S-o}`);
  });

  // Garis emas kiri bawah
  const gap=offsets[offsets.length-1]+18;
  document.getElementById('tl-line1').setAttribute('x1','0');
  document.getElementById('tl-line1').setAttribute('y1',String(H-(S-gap+10)));
  document.getElementById('tl-line1').setAttribute('x2',String(S-gap+10));
  document.getElementById('tl-line1').setAttribute('y2',String(H));

  document.getElementById('tl-line2').setAttribute('x1','0');
  document.getElementById('tl-line2').setAttribute('y1',String(H-(S-gap+22)));
  document.getElementById('tl-line2').setAttribute('x2',String(S-gap+22));
  document.getElementById('tl-line2').setAttribute('y2',String(H));

  // Garis emas kanan atas
  document.getElementById('br-line1').setAttribute('x1',String(W));
  document.getElementById('br-line1').setAttribute('y1',String(S-gap+10));
  document.getElementById('br-line1').setAttribute('x2',String(W-(S-gap+10)));
  document.getElementById('br-line1').setAttribute('y2','0');

  document.getElementById('br-line2').setAttribute('x1',String(W));
  document.getElementById('br-line2').setAttribute('y1',String(S-gap+22));
  document.getElementById('br-line2').setAttribute('x2',String(W-(S-gap+22)));
  document.getElementById('br-line2').setAttribute('y2','0');

  // Dots kiri bawah (area diagonal, di luar poligon gelap)
  const dotG=document.getElementById('dotGroup');
  dotG.innerHTML='';
  const dSize=160;
  const spacing=14;
  for(let row=0;row<12;row++){
    for(let col=0;col<12;col++){
      const x=20+(col*spacing);
      const y=H-dSize-20+(row*spacing);
      const distFromBL=x+(H-y);
      if(distFromBL>S-gap+30 && x<dSize+20 && y<H-16 && y>H-dSize-20){
        const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',String(x));
        c.setAttribute('cy',String(y));
        c.setAttribute('r','1.8');
        c.setAttribute('fill','#D4AF37');
        dotG.appendChild(c);
      }
    }
  }
}

/* ── KONFIGURASI — edit sesuai kebutuhan ── */
const CERT_CONFIG = {
  ttd: {
    tinggi:    100,  // tinggi gambar TTD (px)
    offsetY:     0,  // geser TTD naik(-) / turun(+) dalam px
  },
  stempel: {
    ukuran:     92,  // lebar & tinggi stempel (px)
    offsetY:     4,  // geser stempel naik(-) / turun(+) dalam px
  },
  psikolog: {
    nama:      'Dr. Karina Meriem Beru Brahmana, M.Psi, Psikolog',
    fontSize:  12.5, // ukuran font nama (px)
    sipp:      'No. SIPP 20070136 – 2021 – 02 – 0799',
    sippSize:  14,   // ukuran font nomor SIPP (px)
  },
  watermark: {
    teks:      '',           // teks tambahan di bawah logo (kosongkan jika tidak perlu)
    teksFontSize: 18,        // ukuran font teks watermark (px)
    teksWarna: '#8B6914',    // warna teks watermark
    ukuran:    300,          // ukuran logo watermark (px)
    opacity:   0.1,         // 0.0 = tidak terlihat, 1.0 = penuh (contoh: 0.05 kabur, 0.15 lebih jelas)
  }
};

/* ── Terapkan config ke elemen ── */
function applyConfig(){
  const c = CERT_CONFIG;

  // TTD
  const ti = document.querySelector('.ti');
  if(ti){
    ti.style.height   = c.ttd.tinggi + 'px';
    ti.style.maxWidth = '160px';
    ti.style.top      = c.ttd.offsetY + 'px';
  }

  // Stempel
  const si = document.querySelector('.si');
  if(si){
    si.style.width  = c.stempel.ukuran + 'px';
    si.style.height = c.stempel.ukuran + 'px';
    si.style.top    = c.stempel.offsetY + 'px';
  }

  // Sesuaikan tinggi .tw agar muat gambar terbesar
  const tw = document.querySelector('.tw');
  if(tw){
    const maxH = Math.max(
      c.ttd.tinggi    + Math.abs(c.ttd.offsetY),
      c.stempel.ukuran + Math.abs(c.stempel.offsetY)
    ) + 10;
    tw.style.height = maxH + 'px';
  }

  // Nama psikolog
  const tn = document.getElementById('nama-psikolog');
  if(tn){
    tn.textContent    = c.psikolog.nama;
    tn.style.fontSize = c.psikolog.fontSize + 'px';
  }

  // Nomor SIPP
  const ts = document.getElementById('nomor-sipp');
  if(ts){
    ts.textContent    = c.psikolog.sipp;
    ts.style.fontSize = c.psikolog.sippSize + 'px';
  }

  // Watermark — opacity & ukuran logo
  const wmImg = document.querySelector('.cert-watermark img');
  if(wmImg){
    wmImg.style.opacity = c.watermark.opacity;
    wmImg.style.width   = c.watermark.ukuran + 'px';
    wmImg.style.height  = c.watermark.ukuran + 'px';
  }

  // Watermark — teks tambahan
  const wmTeks = document.getElementById('wm-teks');
  if(wmTeks){
    if(c.watermark.teks){
      wmTeks.textContent  = c.watermark.teks;
      wmTeks.style.display    = 'block';
      wmTeks.style.fontSize   = c.watermark.teksFontSize + 'px';
      wmTeks.style.color      = c.watermark.teksWarna;
      wmTeks.style.opacity    = c.watermark.opacity;
    } else {
      wmTeks.style.display = 'none';
    }
  }
}

/* ── API ── */
const CFG={
  API_URL:'https://lidan-co-id.pages.dev/api/db_psikogram1',
  TABLE_NAME:(new URLSearchParams(window.location.search).get('tabel'))||'rekap_nilai1',
  API_SECRET:'admin'
};
function kat(n){if(n<=69)return'Mental Defective';if(n<=79)return'Borderline';if(n<=89)return'Rata-rata Bawah';if(n<=109)return'Rata-rata';if(n<=119)return'Di Atas Rata-rata';if(n<=129)return'Superior';if(n<=139)return'Sangat Superior';return'Genius'}
function fmt(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return s;return d.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})}

async function main(){
  const p=new URLSearchParams(window.location.search),id=p.get('id_x'),tok=p.get('x_01');
  if(!id||!tok){
    document.getElementById('ls').innerHTML='<div style="color:#D4AF37;font-family:Cinzel,serif;text-align:center;padding:30px;font-size:12px;letter-spacing:2px;">AKSES TIDAK VALID</div>';
    return;
  }
  try{
    const res=await fetch(`${CFG.API_URL}?table=${CFG.TABLE_NAME}&id_x=${id}`,{headers:{'X-Custom-Auth':CFG.API_SECRET}});
    const json=await res.json();
    if(!json.success)throw new Error(json.message||'Data tidak ditemukan');
    const row=Array.isArray(json.data)?json.data[0]:json.data;
    if(String(row.x_01)!==String(tok))throw new Error('Akses ditolak.');
    const bio=(()=>{try{return JSON.parse(row.x_02||'{}')}catch{return{}}})();
    const iq=parseInt(row.x_06)||0;
    document.getElementById('cert-nama').textContent=bio.nama||'—';
    document.getElementById('cert-tgl').textContent='Medan, '+(fmt(row.x_11||bio.tanggal||'')||'—');

    // ── Foto Selfie ──
    const CDN_S='https://assets.mysuplier.my.id/';
    const fotoRaw=bio.foto_selfie||'';
    const fotoUrl=fotoRaw?(fotoRaw.startsWith('http')?fotoRaw:CDN_S+fotoRaw):'';
    const fotoWrap=document.getElementById('cert-foto-wrap');
    if(fotoWrap){
        fotoWrap.style.width='108px';
        fotoWrap.style.flexShrink='0';
        fotoWrap.style.textAlign='center';
        const box=document.createElement('div');
        box.className='qrb';
        box.style.padding='5px';
        if(fotoUrl){
            const img=document.createElement('img');
            img.alt='Foto Peserta';
            img.style.cssText='width:96px!important;height:96px!important;object-fit:cover;object-position:center top;display:block;';
            img.onerror=function(){
                const ph=document.createElement('div');
                ph.className='cert-foto-placeholder';
                ph.innerHTML='FOTO<br>PESERTA';
                box.replaceChild(ph,this);
            };
            img.src=fotoUrl;
            box.appendChild(img);
        }else{
            const ph=document.createElement('div');
            ph.className='cert-foto-placeholder';
            ph.innerHTML='FOTO<br>PESERTA';
            box.appendChild(ph);
        }
        fotoWrap.appendChild(box);
        const lbl=document.createElement('div');
        lbl.className='cert-foto-label';
        lbl.textContent='Foto Peserta';
        fotoWrap.appendChild(lbl);
    }
    document.getElementById('cert-sv').textContent=`${iq} (${kat(iq)})`;
    const qrUrl=`https://laporan.lidan.co.id/sertifikat/sertifikat-iq?id_x=${row.id_x}&x_01=${encodeURIComponent(row.x_01||'')}&tabel=${encodeURIComponent(CFG.TABLE_NAME)}`;
    new QRCode(document.getElementById('qr'),{text:qrUrl,width:96,height:96,colorDark:'#1A1A1A',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    document.getElementById('ls').classList.add('hidden');
    applyConfig();
    setTimeout(drawGeo,150);
  }catch(err){
    document.getElementById('ls').innerHTML=`<div style="color:#D4AF37;font-family:Cinzel,serif;text-align:center;padding:30px;font-size:12px;">GAGAL MEMUAT<br><br><span style="font-size:11px;color:#666;font-family:Arial">${err.message}</span><br><br><button onclick="location.reload()" style="padding:10px 26px;background:linear-gradient(135deg,#8B6914,#D4AF37,#f0d060);color:#0f0a00;border:none;border-radius:2px;font-family:Cinzel,serif;font-size:10px;font-weight:600;letter-spacing:2px;cursor:pointer">COBA LAGI</button></div>`;
  }
}
window.addEventListener('resize',drawGeo);
main();

document.getElementById('btn-jpg').addEventListener('click', async function () {
    const btn = this;
    btn.textContent = 'Memproses…';
    btn.disabled = true;
    try {
        const cert = document.getElementById('certEl');
        const canvas = await html2canvas(cert, {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#ffffff',
            logging: false,
            foreignObjectRendering: false,
            removeContainer: true
        });
        const link = document.createElement('a');
        const nama = (document.getElementById('cert-nama').textContent || 'sertifikat').trim().replace(/\s+/g, '_');
        link.download = `Sertifikat_IQ_${nama}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    } catch (e) {
        alert('Gagal membuat JPG: ' + e.message);
    } finally {
        btn.innerHTML = '&#8681; Download JPG';
        btn.disabled = false;
    }
});
</script>
</body>
