  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --accent: #c8a96e;
      --accent-soft: rgba(200, 169, 110, 0.12);
      --text-primary: #f0ede8;
      --text-muted: #7a776f;
      --border: rgba(200, 169, 110, 0.2);
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 85% 90%, rgba(200,169,110,0.04) 0%, transparent 55%);
      pointer-events: none;
    }

    /* Decorative lines */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(200,169,110,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,169,110,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 64px 56px 56px;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(200,169,110,0.1);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--accent);
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      background: var(--accent-soft);
    }

    .icon-wrap svg {
      width: 28px;
      height: 28px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(38px, 8vw, 52px);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    p {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.75;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 16px 28px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 1px;
      cursor: pointer;
      transition: background 0.25s, color 0.25s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: #0d0d0f; }
    .btn:hover .arrow { transform: translateX(4px); }

    .btn span, .btn .arrow { position: relative; z-index: 1; }

    .arrow {
      transition: transform 0.25s;
      font-size: 16px;
    }

    .corner {
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.4;
    }
    .corner-tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
    .corner-br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

    <a href="#" class="btn">

      <span class="arrow">→</span>
    </a>
  </div>
