<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisa Psikogram</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg:       #080b12;
    --surface:  #0f1420;
    --surface2: #161d2e;
    --border:   #1e2a42;
    --accent:   #5F4EDA;
    --accent2:  #7c6ef0;
    --kurang:   #ef4444;
    --cukup:    #f59e0b;
    --baik:     #22c55e;
    --text:     #e2e8f0;
    --muted:    #5a6a8a;
    --radius:   16px;

    /* Group colors */
    --kem-color: #3b82f6;
    --kem-bg: rgba(59,130,246,.12);
    --kem-glow: rgba(59,130,246,.3);
    --kep-color: #a855f7;
    --kep-bg: rgba(168,85,247,.12);
    --kep-glow: rgba(168,85,247,.3);
    --sik-color: #10b981;
    --sik-bg: rgba(16,185,129,.12);
    --sik-glow: rgba(16,185,129,.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(59,130,246,.06) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 10%, rgba(168,85,247,.05) 0%, transparent 50%);
  }


  /* ── LOADING ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(15,17,23,.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    gap: 16px;
  }
  #loading-overlay.hidden { display: none; }
  .spin {
    width: 48px; height: 48px;
    border: 4px solid rgba(95,78,218,.3);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-txt { font-size: 15px; color: var(--muted); }

  /* ── REPORT HEADER ── */
  .report-header {
    padding: 16px 28px 0;
  }
  .report-header-inner {
    background: linear-gradient(135deg, rgba(95,78,218,.15) 0%, rgba(124,110,240,.08) 50%, rgba(168,85,247,.12) 100%);
    border: 1px solid rgba(95,78,218,.35);
    border-radius: var(--radius);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .report-header-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), #a855f7);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .report-header-icon {
    font-size: 26px;
    width: 44px; height: 44px;
    background: rgba(95,78,218,.2);
    border: 1px solid rgba(95,78,218,.3);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .report-header-title {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -.3px;
    color: var(--text);
  }
  .report-header-title span {
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .report-header-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  /* ── SUMMARY STRIP ── */
  .summary-strip {
    display: flex;
    gap: 12px;
    padding: 20px 28px 0;
    flex-wrap: wrap;
  }
  .sum-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 24px;
    flex: 1;
    min-width: 130px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .sum-box:hover { transform: translateY(-2px); }
  .sum-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--sum-accent, var(--accent2));
    border-radius: 0 0 0 0;
  }
  .sum-box::after {
    content: attr(data-icon);
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 28px;
    opacity: .12;
    pointer-events: none;
  }
  .sum-num {
    font-size: 34px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 5px;
    font-variant-numeric: tabular-nums;
  }
  .sum-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
    padding: 20px 28px 40px;
  }

  /* ── RADAR OVERVIEW CARD ── */
  .radar-overview-card {
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
  }
  .radar-overview-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(95,78,218,.12), rgba(168,85,247,.08));
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .radar-overview-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(95,78,218,.25);
    border: 1px solid rgba(124,110,240,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .radar-overview-body {
    padding: 20px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 32px;
    align-items: center;
  }
  @media (max-width: 800px) {
    .radar-overview-body { grid-template-columns: 1fr; }
  }
  .radar-canvas-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .radar-legend-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 640px) {
    .radar-legend-grid { grid-template-columns: 1fr 1fr; }
  }
  .radar-legend-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .radar-legend-item:hover { background: rgba(255,255,255,.04); }
  .radar-legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .radar-legend-name { font-size: 11px; font-weight: 600; flex: 1; color: var(--text); }
  .radar-legend-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
  }

  /* ── CHART CARD ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .25s, transform .25s, box-shadow .25s;
    animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    position: relative;
  }
  .chart-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--border));
    transition: opacity .25s;
  }
  .chart-card:hover {
    border-color: var(--card-accent-hover, var(--accent));
    transform: translateY(-3px);
    box-shadow: 0 12px 40px var(--card-glow, rgba(95,78,218,.2));
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Card header groups */
  .chart-card-head {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chart-card-icon {
    width: 34px; height: 34px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .chart-card-title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -.1px;
  }
  .chart-card-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
    font-weight: 500;
  }
  .chart-card-body {
    padding: 16px 18px;
  }

  /* Bar aspek */
  .bar-section { margin-bottom: 8px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 9px;
    cursor: pointer;
  }
  .bar-row:hover .bar-track { opacity: .85; }
  .bar-label {
    font-size: 11px;
    width: 44px;
    text-align: right;
    color: var(--muted);
    flex-shrink: 0;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    letter-spacing: -.1px;
  }
  .bar-track {
    flex: 1;
    background: var(--surface2);
    border-radius: 99px;
    height: 20px;
    overflow: hidden;
    position: relative;
    transition: opacity .2s;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 9px;
    font-size: 10px;
    font-weight: 700;
    color: white;
    min-width: 24px;
    transition: width .7s cubic-bezier(.4,0,.2,1);
    position: relative;
    overflow: hidden;
  }
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
    animation: shimmer 2.5s infinite;
    animation-delay: var(--shimmer-delay, 0s);
  }
  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 160%; }
  }
  .bar-count {
    font-size: 11px;
    color: var(--muted);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .legend-dots {
    display: flex;
    gap: 14px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .legend-dot {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-weight: 500;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Pie IQ */
  .pie-wrap {
    position: relative;
    height: 210px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pie-center-text {
    position: absolute;
    text-align: center;
    pointer-events: none;
  }
  .pie-center-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .pie-center-lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
  }
  .pie-legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }
  .pie-legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 6px;
    transition: background .15s;
  }
  .pie-legend-row:hover { background: var(--surface2); }
  .pie-legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .pie-legend-lbl { flex: 1; }
  .pie-legend-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .pie-legend-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    width: 38px;
    text-align: right;
  }

  /* IQ spans full width */
  .chart-card.iq-card {
    grid-column: 1 / -1;
  }
  .iq-card .chart-card-body {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 640px) {
    .iq-card .chart-card-body { grid-template-columns: 1fr; }
    .pie-wrap { height: 180px; }
  }

  /* ── ERROR / EMPTY ── */
  .error-box, .empty-box {
    grid-column: 1/-1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 50px;
    text-align: center;
    color: var(--muted);
  }
  .error-box { border-color: var(--kurang); color: #fca5a5; }
  .error-icon, .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── MODAL POPUP ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
    animation: popIn .2s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn {
    from { transform: scale(.92); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .modal-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .modal-head-info { flex: 1; }
  .modal-head-title { font-size: 16px; font-weight: 800; }
  .modal-head-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .modal-close:hover { background: var(--border); }

  /* Kategori badge di modal head */
  .kat-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .modal-body {
    overflow-y: auto;
    flex: 1;
    padding: 16px 20px;
  }

  /* Search in modal */
  .modal-search {
    margin-bottom: 14px;
  }
  .modal-search input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: 'Outfit', sans-serif;
  }
  .modal-search input:focus { outline: none; border-color: var(--accent2); }

  /* Modal table */
  .modal-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .modal-table th {
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 9px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }
  .modal-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(46,52,80,.5);
    vertical-align: middle;
  }
  .modal-table tr:last-child td { border-bottom: none; }
  .modal-table tr:hover td { background: var(--surface2); }

  .skor-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px; height: 24px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .pill-k  { background: rgba(239,68,68,.2);  color: #fca5a5; }
  .pill-c  { background: rgba(245,158,11,.2); color: #fcd34d; }
  .pill-b  { background: rgba(34,197,94,.2);  color: #86efac; }

  .nama-link {
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
  }
  .nama-link:hover { color: var(--accent2); text-decoration: underline; }

  /* Ranking no */
  .rank-no {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 24px;
    text-align: center;
  }

  /* Filter chips di modal */
  .filter-chips {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    color: var(--muted);
    background: transparent;
    font-family: inherit;
  }
  .chip.active-k { background: rgba(239,68,68,.2);  color: #fca5a5; border-color: #ef4444; }
  .chip.active-c { background: rgba(245,158,11,.2); color: #fcd34d; border-color: #f59e0b; }
  .chip.active-b { background: rgba(34,197,94,.2);  color: #86efac; border-color: #22c55e; }
  .chip.active-all { background: var(--accent); color: white; border-color: var(--accent); }
  .chip:hover { border-color: var(--accent2); }

  /* Empty modal */
  .modal-empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  /* IQ colors */
  :root {
    --iq0: #7f1d1d; --iq1: #991b1b; --iq2: #b45309; --iq3: #78716c;
    --iq4: #4ade80; --iq5: #3b82f6; --iq6: #8b5cf6;
    --iq7: #a855f7; --iq8: #ec4899;
  }

  /* ── INSIGHT PANEL ── */
  .insight-panel {
    margin: 0 28px 48px;
    display: none;
    flex-direction: column;
    gap: 24px;
  }
  .insight-panel.visible { display: flex; }

  .insight-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .insight-header-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(95,78,218,.3), rgba(168,85,247,.2));
    border: 1px solid rgba(168,85,247,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .insight-header-text h2 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -.3px;
  }
  .insight-header-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Health Score */
  .health-score-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .health-score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 28px;
    flex: 1;
    min-width: 200px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .health-score-ring {
    position: relative;
    width: 72px; height: 72px;
    flex-shrink: 0;
  }
  .health-score-ring svg { transform: rotate(-90deg); }
  .health-score-ring-num {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }
  .health-score-info h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .health-score-info p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .health-grade {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 6px;
  }

  /* Strength / Weakness section */
  .sw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 700px) { .sw-grid { grid-template-columns: 1fr; } }

  .sw-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .sw-card-head {
    padding: 13px 18px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .sw-card-head.strength { background: rgba(34,197,94,.08); border-bottom-color: rgba(34,197,94,.2); color: #86efac; }
  .sw-card-head.weakness { background: rgba(239,68,68,.08); border-bottom-color: rgba(239,68,68,.2); color: #fca5a5; }

let allRows = [];        // raw data dari API

// ── KLASIFIKASI ──
function klasSkor(s) {
  if (s <= 4) return 'kurang';
  if (s <= 6) return 'cukup';
  return 'baik';
}
function klasIQ(iq) {
  for (const k of IQ_KATEGORI) {
    if (iq >= k.min && iq <= k.max) return k;
  }
  return IQ_KATEGORI[4];
}

// ── SAFE JSON PARSE ──
function sj(str, fb) { try { return JSON.parse(str||'{}'); } catch { return fb; } }

// ── LOAD DATA ──
async function loadData() {
  const params = new URLSearchParams(location.search);
  const table = params.get('table');
  if (!table || !table.trim()) {
    renderError('Parameter <b>?table=</b> tidak ditemukan di URL.<br>Contoh penggunaan: <code>index_publik.html?table=nama_tabel</code>');
    return;
  }
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('load-txt').textContent = `Memuat data...`;
  document.getElementById('main-grid').innerHTML = '';
  document.getElementById('summary-strip').style.display = 'none';
  document.getElementById('report-header').style.display = 'none';
  _insightRendered = false;

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);

  try {
    const url = `${API}?table=${encodeURIComponent(table)}`;
    const res = await fetch(url, {
      signal: controller.signal,
      headers:{ 'X-Custom-Auth': SECRET, 'Content-Type':'application/json' }
    });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.message || 'Gagal ambil data');
    allRows = json.data || [];
    if (allRows.length === 0) {
      renderEmpty();
    } else {
      renderAll();
      document.getElementById('insight-panel').classList.remove('visible');
      document.getElementById('insight-panel').innerHTML = '';
    }
  } catch(e) {
    clearTimeout(timeoutId);
    renderError(e.name === 'AbortError' ? 'Koneksi timeout. Periksa jaringan Anda.' : e.message);
  } finally {
    document.getElementById('loading-overlay').classList.add('hidden');
  }
}

// ── RENDER ALL ──
function renderAll() {
  const grid = document.getElementById('main-grid');
  grid.innerHTML = '';
  _cardIndex = 0;

  // Hitung summary: per peserta, mayoritas aspek → Baik/Cukup/Kurang
  const total = allRows.length;
  let countBaik=0, countCukup=0, countKurang=0, iqTotal=0, iqCount=0;

  allRows.forEach(row => {
    const kem = sj(row.x_03,{}); const kep = sj(row.x_04,{}); const sik = sj(row.x_05,{});
    let pBaik=0, pCukup=0, pKurang=0;
    ALL_ASPEK.forEach(a => {
      const src = a.group==='KEMAMPUAN'?kem: a.group==='KEPRIBADIAN'?kep:sik;
      const s = parseInt(src[a.key])||0;
      if (s>0) {
        const k = klasSkor(s);
        if (k==='baik') pBaik++;
        else if (k==='cukup') pCukup++;
        else pKurang++;
      }
    });
    // Mayoritas aspek peserta ini
    if (pBaik>=pCukup && pBaik>=pKurang) countBaik++;
    else if (pCukup>=pKurang) countCukup++;
    else countKurang++;

    const iq = parseInt(row.x_06)||0;
    if (iq>0) { iqTotal+=iq; iqCount++; }
  });

  document.getElementById('sum-total').textContent      = total;
  document.getElementById('sum-count-baik').textContent   = countBaik;
  document.getElementById('sum-count-cukup').textContent  = countCukup;
  document.getElementById('sum-count-kurang').textContent = countKurang;
  document.getElementById('sum-iq-avg').textContent     = iqCount>0?Math.round(iqTotal/iqCount):'–';

  // Warna border box ikut mayoritas
  const dominant = countBaik>=countCukup && countBaik>=countKurang ? '#22c55e'
                 : countCukup>=countKurang ? '#f59e0b' : '#ef4444';
  document.getElementById('sum-health-box').style.setProperty('--sum-accent', dominant);

  // Animated proportion bar bawah
  setTimeout(() => {
    document.getElementById('sum-bar-baik').style.flex   = countBaik;
    document.getElementById('sum-bar-cukup').style.flex  = countCukup;
    document.getElementById('sum-bar-kurang').style.flex = countKurang;
  }, 120);

  document.getElementById('summary-strip').style.display = 'flex';

  // Report header
  const tableName = (new URLSearchParams(location.search).get('table') || '').toUpperCase();
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const tglMuat = `${pad(now.getDate())} ${['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'][now.getMonth()]} ${now.getFullYear()}, ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('report-header-table-name').textContent = tableName;
  document.getElementById('report-header-time').textContent = tglMuat;
  document.getElementById('report-header-count').textContent = total;
  document.getElementById('report-header').style.display = 'block';

  // Render IQ (full width)
  const iqCard = buildIQCard();
  grid.appendChild(iqCard);

  // Render Arah Minat (full width)
  const minatCard = buildMinatCard();
  grid.appendChild(minatCard);

  // Render Radar overview card (di bawah, klik item → popup aspek)
  const radarCard = buildRadarCard();
  grid.appendChild(radarCard);

  // Tombol Insight
  const insightBtn = document.createElement('div');
  insightBtn.className = 'insight-btn-wrap';
  insightBtn.innerHTML = `
    <button class="btn-insight" id="btn-show-insight" onclick="toggleInsight()">
      📋 Insight &amp; Rekomendasi Sekolah
    </button>`;
  grid.appendChild(insightBtn);

  // Pre-build aspek data (disimpan di memori, bukan di DOM)
  _buildAllAspekData();
}

      const src = aspek.group==='KEMAMPUAN' ? sj(row.x_03,{})
                : aspek.group==='KEPRIBADIAN' ? sj(row.x_04,{})
                : sj(row.x_05,{});

      const k = klasSkor(s);

// ── BUILD ASPEK CARD ──
let _cardIndex = 0;
function buildAspekCard(aspek) {
  const gc = GROUP_COLORS[aspek.group] || GROUP_COLORS['KEMAMPUAN'];
  const cardIdx = _cardIndex++;

  // Hitung distribusi
  const baik=[], cukup=[], kurang=[];
  allRows.forEach(row => {
    const src = aspek.group==='KEMAMPUAN' ? sj(row.x_03,{})
              : aspek.group==='KEPRIBADIAN' ? sj(row.x_04,{})
              : sj(row.x_05,{});
    const s = parseInt(src[aspek.key]) || 0;
    const iq = parseInt(row.x_06) || 0;
    const bio = sj(row.x_02,{});
    const nama = bio.nama || row.x_01 || '–';
    const entry = { nama, skor:s, iq, id_x: row.id_x, x_01: row.x_01 };
    if (s<=0) return;
    const k = klasSkor(s);
    if (k==='baik') baik.push(entry);
    else if (k==='cukup') cukup.push(entry);
    else kurang.push(entry);
  });

  const total = baik.length + cukup.length + kurang.length;

  const card = document.createElement('div');
  card.className = 'chart-card';
  card.style.cssText = `
    --card-accent: ${gc.accent};
    --card-accent-hover: ${gc.accent};
    --card-glow: ${gc.glow};
    animation-delay: ${cardIdx * 45}ms;
  `;

  card.innerHTML = `
    <div class="chart-card-head" style="background:${gc.bg}; border-bottom-color:${gc.accent}22;">
      <div class="chart-card-icon" style="background:${gc.bg}; border:1px solid ${gc.accent}44; color:${gc.accent};">
        ${aspek.icon}
      </div>
      <div>
        <div class="chart-card-title">${aspek.label}</div>
        <div class="chart-card-sub">${aspek.group} &bull; ${total} peserta</div>
      </div>
    </div>
    <div class="chart-card-body">
      ${buildBarRow('baik',   'Baik',   baik.length,   total, aspek, baik,   cukup, kurang, gc, 0)}
      ${buildBarRow('cukup',  'Cukup',  cukup.length,  total, aspek, baik,   cukup, kurang, gc, 1)}
      ${buildBarRow('kurang', 'Kurang', kurang.length,  total, aspek, baik,   cukup, kurang, gc, 2)}
      <div class="legend-dots">
        <div class="legend-dot" onclick="openModal('${aspek.label}','baik','${aspek.key}','${aspek.group}')">
          <div class="dot" style="background:var(--baik)"></div><span>Baik (${baik.length})</span>
        </div>
        <div class="legend-dot" onclick="openModal('${aspek.label}','cukup','${aspek.key}','${aspek.group}')">
          <div class="dot" style="background:var(--cukup)"></div><span>Cukup (${cukup.length})</span>
        </div>
        <div class="legend-dot" onclick="openModal('${aspek.label}','kurang','${aspek.key}','${aspek.group}')">
          <div class="dot" style="background:var(--kurang)"></div><span>Kurang (${kurang.length})</span>
        </div>
      </div>
    </div>`;

  // Simpan data ke dataset card
  card.dataset.aspekKey   = aspek.key;
  card.dataset.aspekGroup = aspek.group;
  card.dataset.aspekLabel = aspek.label;
  card.dataset.baik   = JSON.stringify(baik.sort((a,b)=>b.skor-a.skor));
  card.dataset.cukup  = JSON.stringify(cukup.sort((a,b)=>b.skor-a.skor));
  card.dataset.kurang = JSON.stringify(kurang.sort((a,b)=>a.skor-b.skor));

  return card;
}

function buildBarRow(kat, range, count, total, aspek, baik, cukup, kurang, gc, idx) {
  const pct = total>0 ? Math.round((count/total)*100) : 0;
  const gradients = {
    baik:   'linear-gradient(90deg, #16a34a, #22c55e, #4ade80)',
    cukup:  'linear-gradient(90deg, #d97706, #f59e0b, #fbbf24)',
    kurang: 'linear-gradient(90deg, #dc2626, #ef4444, #f87171)',
  };
  const grad = gradients[kat] || gradients.baik;
  const delay = `${idx * 0.4}s`;
  return `
    <div class="bar-row" onclick="openModal('${aspek.label}','${kat}','${aspek.key}','${aspek.group}')">
      <div class="bar-label">${range}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:0%; background:${grad}; --shimmer-delay:${delay};" data-target="${pct}">
          ${pct>=12 ? pct+'%' : ''}
        </div>
      </div>
      <div class="bar-count">${count}</div>
    </div>`;
}

function animateBars() {
  document.querySelectorAll('.bar-fill').forEach(el => {
    const target = el.dataset.target;
    setTimeout(() => { el.style.width = target + '%'; }, 10);
  });
}

// ── BUILD IQ CARD ──
function buildIQCard() {
  // Hitung distribusi IQ
  const dist = IQ_KATEGORI.map(k => ({ ...k, entries:[] }));
  allRows.forEach(row => {
    const iq = parseInt(row.x_06) || 0;
    if (!iq) return;
    const bio = sj(row.x_02,{});
    const nama = bio.nama || row.x_01 || '–';
    const entry = { nama, iq, id_x: row.id_x, x_01: row.x_01 };
    const kat = dist.find(d => iq >= d.min && iq <= d.max);
    if (kat) kat.entries.push(entry);
  });

  const totalIQ = dist.reduce((s,d)=>s+d.entries.length, 0);
  const iqValues = allRows.map(r=>parseInt(r.x_06)||0).filter(v=>v>0);
  const iqAvg = iqValues.length ? Math.round(iqValues.reduce((a,b)=>a+b,0)/iqValues.length) : 0;

  const card = document.createElement('div');
  card.className = 'chart-card iq-card';
  card.style.cssText = `--card-accent: #a855f7; --card-accent-hover: #a855f7; --card-glow: rgba(168,85,247,.25); animation-delay: ${_cardIndex * 45}ms;`;
  _cardIndex++;
  card.innerHTML = `
    <div class="chart-card-head" style="background:rgba(168,85,247,.1); border-bottom-color:rgba(168,85,247,.3);">
      <div class="chart-card-icon" style="background:rgba(168,85,247,.15); border:1px solid rgba(168,85,247,.3);">📊</div>
      <div>
        <div class="chart-card-title">Intelligence Quotient (IQ)</div>
        <div class="chart-card-sub">Distribusi kategori IQ &bull; ${totalIQ} peserta &bull; Rata-rata: ${iqAvg}</div>
      </div>
    </div>
    <div class="chart-card-body">
      <div class="pie-wrap">
        <canvas id="pie-iq" width="240" height="240"></canvas>
        <div class="pie-center-text">
          <div class="pie-center-num" style="color:#c084fc;">${iqAvg}</div>
          <div class="pie-center-lbl">Rata-rata IQ</div>
        </div>
      </div>
      <div class="pie-legend" id="pie-legend"></div>
    </div>`;

  // Simpan distribusi untuk modal
  card.dataset.iqDist = JSON.stringify(dist);

  // Render legenda
  setTimeout(() => {
    const legendEl = card.querySelector('#pie-legend');
    dist.filter(d=>d.entries.length>0).forEach(d => {
      const pct = totalIQ>0 ? Math.round(d.entries.length/totalIQ*100) : 0;
      const row = document.createElement('div');
      row.className = 'pie-legend-row';
      row.innerHTML = `
        <div class="pie-legend-dot" style="background:${d.color};"></div>
        <div class="pie-legend-lbl">${d.label}</div>
        <div class="pie-legend-count">${d.entries.length} orang</div>
        <div class="pie-legend-pct">${pct}%</div>`;
      row.onclick = () => openIQModal(d.label, d.entries, d.color, dist, totalIQ);
      legendEl.appendChild(row);
    });

    // Draw pie chart
    const ctx = card.querySelector('#pie-iq').getContext('2d');
    if (pieChart) { pieChart.destroy(); }
    const filtered = dist.filter(d=>d.entries.length>0);
    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: filtered.map(d=>d.label),
        datasets: [{
          data: filtered.map(d=>d.entries.length),
          backgroundColor: filtered.map(d=>d.color+'cc'),
          borderColor: filtered.map(d=>d.color),
          borderWidth: 2,
          hoverOffset: 8,
        }]
      },
      options: {
        cutout: '62%',
        responsive: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const pct = totalIQ>0?Math.round(ctx.raw/totalIQ*100):0;
                return ` ${ctx.label}: ${ctx.raw} orang (${pct}%)`;
              }
            },
            bodyColor: '#e2e8f0',
            backgroundColor: '#191c27',
            borderColor: '#2e3450',
            borderWidth: 1,
          }
        },
        onClick: (evt, elements) => {
          if (!elements.length) return;
          const idx = elements[0].index;
          const d = filtered[idx];
          openIQModal(d.label, d.entries, d.color, dist, totalIQ);
        }
      }
    });
  }, 100);

  return card;
}

// ── BUILD MINAT CARD ──
const MINAT_COLORS = [
  '#3b82f6','#a855f7','#10b981','#f59e0b','#ef4444',
  '#06b6d4','#ec4899','#84cc16','#f97316','#6366f1',
  '#14b8a6','#e11d48','#8b5cf6','#0ea5e9','#d946ef',
];

function buildMinatCard() {
  // Kumpulkan minat tertinggi tiap peserta (index 0 dari array x_10)
  const minatMap = {}; // singkatan → { nama, keterangan, entries:[] }

  allRows.forEach(row => {
    const arr = sj(row.x_10, null);
    if (!Array.isArray(arr) || arr.length === 0) return;
    const top = arr[0];
    if (!top || !top.singkatan) return;
    const key = top.singkatan;
    if (!minatMap[key]) {
      minatMap[key] = { singkatan: key, nama: top.nama || key, keterangan: top.keterangan || '', entries: [] };
    }
    const bio  = sj(row.x_02, {});
    const nama = bio.nama || row.x_01 || '–';
    minatMap[key].entries.push({ nama, x_01: row.x_01 });
  });

  const minatList = Object.values(minatMap).sort((a,b) => b.entries.length - a.entries.length);
  const totalMinat = minatList.reduce((s, m) => s + m.entries.length, 0);
  const maxCount   = minatList.length ? minatList[0].entries.length : 1;

  const card = document.createElement('div');
  card.className = 'chart-card minat-card';
  card.style.cssText = `grid-column:1/-1; --card-accent:#06b6d4; --card-accent-hover:#06b6d4; --card-glow:rgba(6,182,212,.2); animation-delay:${_cardIndex*45}ms;`;
  _cardIndex++;

  if (!minatList.length) {
    card.innerHTML = `
      <div class="chart-card-head" style="background:rgba(6,182,212,.1); border-bottom-color:rgba(6,182,212,.3);">
        <div class="chart-card-icon" style="background:rgba(6,182,212,.15); border:1px solid rgba(6,182,212,.3);">🎯</div>
        <div>
          <div class="chart-card-title">Arah Minat / Pekerjaan</div>
          <div class="chart-card-sub">Distribusi minat tertinggi per peserta</div>
        </div>
      </div>
      <div class="chart-card-body"><div style="color:var(--muted); text-align:center; padding:20px;">Tidak ada data minat</div></div>`;
    return card;
  }

  const barsHtml = minatList.map((m, i) => {
    const color = MINAT_COLORS[i % MINAT_COLORS.length];
    const pct   = Math.round(m.entries.length / totalMinat * 100);
    const barW  = Math.round(m.entries.length / maxCount * 100);
    return `
      <div class="minat-bar-row" onclick="openMinatPopup('${escHtml(m.singkatan)}')"
           title="${escHtml(m.keterangan)}">
        <div class="minat-bar-label">
          <span class="minat-singkatan" style="color:${color};">${escHtml(m.singkatan)}</span>
          <span class="minat-nama">${escHtml(m.nama)}</span>
        </div>
        <div class="minat-bar-track">
          <div class="minat-bar-fill" data-target="${barW}" style="width:0%; background:${color}cc;">
          </div>
        </div>
        <div class="minat-bar-meta">
          <span class="minat-count" style="color:${color};">${m.entries.length}</span>
          <span class="minat-pct">${pct}%</span>
        </div>
      </div>`;
  }).join('');

  card.innerHTML = `
    <div class="chart-card-head" style="background:rgba(6,182,212,.08); border-bottom-color:rgba(6,182,212,.3);">
      <div class="chart-card-icon" style="background:rgba(6,182,212,.15); border:1px solid rgba(6,182,212,.3);">🎯</div>
      <div>
        <div class="chart-card-title">Arah Minat / Pekerjaan</div>
        <div class="chart-card-sub">Minat tertinggi per peserta · ${totalMinat} peserta · ${minatList.length} jenis minat · Klik bar untuk detail</div>
      </div>
    </div>
    <div class="chart-card-body minat-body">
      ${barsHtml}
    </div>`;

  // Simpan data minat ke memori
  _minatData = {};
  minatList.forEach((m, i) => {
    m.color = MINAT_COLORS[i % MINAT_COLORS.length];
    _minatData[m.singkatan] = m;
  });

  // Animate bars
  setTimeout(() => {
    card.querySelectorAll('.minat-bar-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  }, 80);

  return card;
}

// ── MODAL ASPEK ──
let _modalAllEntries = { baik:[], cukup:[], kurang:[] };
let _modalAspekLabel = '';
let _modalAspekKey   = '';

function openModal(aspekLabel, kat, aspekKey, aspekGroup) {
  // Cari card yang sesuai
  const cards = document.querySelectorAll('.chart-card');
  let baik=[], cukup=[], kurang=[];
  cards.forEach(c => {
    if (c.dataset.aspekKey === aspekKey && c.dataset.aspekGroup === aspekGroup) {
      baik   = JSON.parse(c.dataset.baik   || '[]');
      cukup  = JSON.parse(c.dataset.cukup  || '[]');
      kurang = JSON.parse(c.dataset.kurang || '[]');
    }
  });

  _modalAllEntries = { baik, cukup, kurang };
  _modalAspekLabel = aspekLabel;
  _modalAspekKey   = aspekKey;
  modalActiveFilter = kat;

  updateModalContent();
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-search-inp').value = '';
}

function updateModalContent() {
  const kat = modalActiveFilter;
  const { baik, cukup, kurang } = _modalAllEntries;
  const total = baik.length + cukup.length + kurang.length;

  // Badge
  const badgeEl = document.getElementById('modal-badge');
  const colors = { baik:['#86efac','rgba(34,197,94,.2)'], cukup:['#fcd34d','rgba(245,158,11,.2)'], kurang:['#fca5a5','rgba(239,68,68,.2)'], all:['#a5b4fc','rgba(99,102,241,.2)'] };
  const labels = { baik:'Baik (7–10)', cukup:'Cukup (5–6)', kurang:'Kurang (1–4)', all:'Semua Kategori' };
  const [fc, bg] = colors[kat] || colors.all;
  badgeEl.style.cssText = `color:${fc}; background:${bg};`;
  badgeEl.textContent = labels[kat] || '';

  document.getElementById('modal-title').textContent = _modalAspekLabel;

  let entries;
  if (kat==='all')    entries = [...baik,...cukup,...kurang];
  else if (kat==='baik')   entries = baik;
  else if (kat==='cukup')  entries = cukup;
  else                      entries = kurang;

  document.getElementById('modal-sub').textContent =
    `${entries.length} peserta dari total ${total} peserta`;

  // Chips filter
  const chipsEl = document.getElementById('modal-chips');
  chipsEl.innerHTML = '';
  const chips = [
    { key:'all',    label:`Semua (${total})`,       cls:'active-all' },
    { key:'baik',   label:`Baik (${baik.length})`,  cls:'active-b' },
    { key:'cukup',  label:`Cukup (${cukup.length})`,cls:'active-c' },
    { key:'kurang', label:`Kurang (${kurang.length})`,cls:'active-k'},
  ];
  chips.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = `chip ${kat===ch.key ? ch.cls : ''}`;
    btn.textContent = ch.label;
    btn.onclick = () => { modalActiveFilter = ch.key; document.getElementById('modal-search-inp').value=''; updateModalContent(); };
    chipsEl.appendChild(btn);
  });

  // Store for search
  modalRows = entries;
  renderModalTable(entries);
}

function renderModalTable(entries) {
  const wrap = document.getElementById('modal-table-wrap');
  if (!entries.length) {
    wrap.innerHTML = '<div class="modal-empty">😕 Tidak ada data pada kategori ini</div>';
    return;
  }
  let html = `<table class="modal-table">
    <thead><tr>
      <th>#</th>
      <th>Nama</th>
      <th>Skor</th>
      <th>IQ</th>
    </tr></thead><tbody>`;
  entries.forEach((e,i) => {
    const kat = klasSkor(e.skor);
    const pillCls = kat==='baik'?'pill-b': kat==='cukup'?'pill-c':'pill-k';
    const iqKat = klasIQ(e.iq);
    const finalUrl = `index_final.html?id_x=${e.id_x}&x_01=${encodeURIComponent(e.x_01||'')}`;
    html += `<tr>
      <td><span class="rank-no">${i+1}</span></td>
      <td><a href="${finalUrl}" class="nama-link" target="_blank">${escHtml(e.nama)}</a></td>
      <td><span class="skor-pill ${pillCls}">${e.skor}</span></td>
      <td>
        <span style="font-family:'JetBrains Mono',monospace; font-size:12px; color:${iqKat.color}; font-weight:700;">${e.iq||'–'}</span>
        ${e.iq ? `<span style="font-size:10px; color:var(--muted); margin-left:4px;">${iqKat.label}</span>` : ''}
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function filterModalTable() {
  const q = document.getElementById('modal-search-inp').value.toLowerCase();
  const filtered = modalRows.filter(e => (e.nama||'').toLowerCase().includes(q));
  renderModalTable(filtered);
}

// ── ALL ASPEK DATA (built once after loadData) ──
let _allAspekData = {}; // key → { aspek, baik:[], cukup:[], kurang:[] }

function _buildAllAspekData() {
  _allAspekData = {};
  ALL_ASPEK.forEach(aspek => {
    const baik=[], cukup=[], kurang=[];
    allRows.forEach(row => {
      const src = aspek.group==='KEMAMPUAN' ? sj(row.x_03,{})
                : aspek.group==='KEPRIBADIAN' ? sj(row.x_04,{})
                : sj(row.x_05,{});
      const s = parseInt(src[aspek.key]) || 0;
      const iq = parseInt(row.x_06) || 0;
      const bio = sj(row.x_02,{});
      const nama = bio.nama || row.x_01 || '–';
      const entry = { nama, skor:s, iq, id_x: row.id_x, x_01: row.x_01 };
      if (s<=0) return;
      const k = klasSkor(s);
      if (k==='baik') baik.push(entry);
      else if (k==='cukup') cukup.push(entry);
      else kurang.push(entry);
    });
    _allAspekData[aspek.key] = {
      aspek,
      baik:   baik.sort((a,b)=>b.skor-a.skor),
      cukup:  cukup.sort((a,b)=>b.skor-a.skor),
      kurang: kurang.sort((a,b)=>a.skor-b.skor),
    };
  });
}

  ].forEach(ch => {
    const btn = document.createElement('button');
    btn.className = `chip ${kat===ch.key ? ch.cls : ''}`;
    btn.textContent = ch.label;
    btn.onclick = () => { _detailActiveFilter = ch.key; document.getElementById('detail-search-inp').value=''; _updateDetailContent(); };
    chipsEl.appendChild(btn);
  });

  _detailRows = entries;
  renderDetailTable(entries);
}

function renderDetailTable(entries) {
  const wrap = document.getElementById('detail-table-wrap');
  if (!entries.length) {
    wrap.innerHTML = '<div class="modal-empty">😕 Tidak ada data pada kategori ini</div>';
    return;
  }
  let html = `<table class="modal-table">
    <thead><tr>
      <th>#</th>
      <th>Nama</th>
      <th>Skor</th>
      <th>IQ</th>
      <th>View</th>
    </tr></thead><tbody>`;
  entries.forEach((e, i) => {
    const kat = klasSkor(e.skor);
    const pillCls = kat==='baik'?'pill-b': kat==='cukup'?'pill-c':'pill-k';
    const iqKat = klasIQ(e.iq);
    const viewUrl = `view.html?token=${encodeURIComponent(e.x_01||'')}`;
    html += `<tr>
      <td><span class="rank-no">${i+1}</span></td>
      <td style="font-weight:600;">${escHtml(e.nama)}</td>
      <td><span class="skor-pill ${pillCls}">${e.skor}</span></td>
      <td>
        <span style="font-family:'JetBrains Mono',monospace; font-size:12px; color:${iqKat.color}; font-weight:700;">${e.iq||'–'}</span>
        ${e.iq ? `<span style="font-size:10px; color:var(--muted); margin-left:4px;">${iqKat.label}</span>` : ''}
      </td>
      <td><a href="${viewUrl}" target="_blank" class="btn-view">🔗 View</a></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function filterDetailTable() {
  const q = document.getElementById('detail-search-inp').value.toLowerCase();
  renderDetailTable(_detailRows.filter(e => (e.nama||'').toLowerCase().includes(q)));
}

function closeDetailPopup() {
  document.getElementById('detail-popup-overlay').classList.remove('open');
}
function closeDetailPopupOutside(e) {
  if (e.target === document.getElementById('detail-popup-overlay')) closeDetailPopup();
}

// ── TOGGLE INSIGHT ──
let _insightRendered = false;
function toggleInsight() {
  const panel = document.getElementById('insight-panel');
  const btn   = document.getElementById('btn-show-insight');
  const isVisible = panel.classList.contains('visible');
  if (isVisible) {
    panel.classList.remove('visible');
    if (btn) btn.classList.remove('active');
  } else {
    if (!_insightRendered) {
      renderInsightPanel();
      _insightRendered = true;
    }
    panel.classList.add('visible');
    if (btn) btn.classList.add('active');
    setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
  }
}

// ── RENDER INSIGHT PANEL ──
function renderInsightPanel() {
  const panel = document.getElementById('insight-panel');
  if (!allRows.length) { panel.classList.remove('visible'); return; }

  // Hitung % kurang per aspek
  const aspekStats = ALL_ASPEK.map(aspek => {
    let baik=0, cukup=0, kurang=0;
    allRows.forEach(row => {
      const src = aspek.group==='KEMAMPUAN' ? sj(row.x_03,{})
                : aspek.group==='KEPRIBADIAN' ? sj(row.x_04,{})
                : sj(row.x_05,{});
      const s = parseInt(src[aspek.key]) || 0;
      if (s<=0) return;
      const k = klasSkor(s);
      if (k==='baik') baik++;
      else if (k==='cukup') cukup++;
      else kurang++;
    });
    const total = baik+cukup+kurang;
    return {
      ...aspek,
      baik, cukup, kurang, total,
      pctBaik:   total>0 ? Math.round(baik/total*100)   : 0,
      pctCukup:  total>0 ? Math.round(cukup/total*100)  : 0,
      pctKurang: total>0 ? Math.round(kurang/total*100) : 0,
    };
  });

  // Top 3 kekuatan (% baik tertinggi)
  const strengths = [...aspekStats].sort((a,b)=>b.pctBaik-a.pctBaik).slice(0,3);
  // Top 3 kelemahan (% kurang tertinggi)
  const weaknesses = [...aspekStats].sort((a,b)=>b.pctKurang-a.pctKurang).slice(0,3);

  // Health score: rata-rata % baik semua aspek
  const healthScore = Math.round(aspekStats.reduce((s,a)=>s+a.pctBaik,0)/aspekStats.length);
  const healthGrade = healthScore>=80?{label:'Sangat Baik',color:'#22c55e',bg:'rgba(34,197,94,.15)',emoji:'🌟'}

              <div class="sw-item-label">${a.label}</div>
              <div class="sw-item-sub">${a.group}</div>

            <span class="sw-pct-pill bad">${a.pctKurang}% Kurang</span>
          </div>`).join('')}

              <div class="rekom-card-head">
                <span class="rekom-aspek-icon">${a.icon}</span>
                <span class="rekom-aspek-name">${a.label}<br><small style="font-weight:400; color:var(--muted);">${priorityLabel[i]}</small></span>
                <span class="rekom-kurang-pct">${a.pctKurang}% Kurang</span>
              </div>
              <div class="rekom-items">
                ${rekom.rekomendasi.map(r=>`
                  <div class="rekom-item">
                    <span class="rekom-tipe-badge ${tipeClass[r.tipe]}">${tipeIcon[r.tipe]} ${tipeLabel[r.tipe]}</span>
                    <div class="rekom-item-info">
                      <div class="rekom-item-judul">${r.icon} ${r.judul}</div>
                      <div class="rekom-item-desc">${r.desc}</div>
                      <div class="rekom-item-meta">
                        <span class="rekom-meta-tag">⏱️ ${r.durasi}</span>
                        <span class="rekom-meta-tag">👤 ${r.peserta}</span>
                      </div>
                    </div>
                  </div>`).join('')}
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>
  `;

  panel.classList.add('visible');
}
