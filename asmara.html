  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a0a14;
      --surface: #220d1a;
      --accent: #e8748a;
      --accent2: #f0a0b0;
      --accent-soft: rgba(232, 116, 138, 0.1);
      --text-primary: #f8f0f3;
      --text-muted: #9a7a88;
      --border: rgba(232, 116, 138, 0.2);
      --gold: #c8a87e;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(232,116,138,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Floating petals */
    .petals {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .petal {
      position: absolute;
      font-size: 10px;
      opacity: 0;
      animation: floatPetal linear infinite;
      color: var(--accent);
    }

    @keyframes floatPetal {
      0%   { opacity: 0; transform: translateY(110vh) rotate(0deg); }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-10vh) rotate(360deg); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 60px 52px 52px;
      max-width: 520px;
      width: 90%;
      box-shadow:
        0 0 0 1px rgba(232,116,138,0.05),
        0 24px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(232,116,138,0.1);
      animation: bloom 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes bloom {
      from { opacity: 0; transform: scale(0.94) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .heart-icon {
      width: 68px; height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      position: relative;
    }

    .heart-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-soft);
      border-radius: 50%;
      animation: heartPulse 2.5s ease-in-out infinite;
    }

    @keyframes heartPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.6; }
    }

    .heart-icon svg {
      width: 32px; height: 32px;
      fill: var(--accent);
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 8vw, 54px);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    h1 em {
      font-style: italic;
      color: var(--accent2);
    }

    .flourish {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .flourish-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .flourish-icon {
      color: var(--gold);
      font-size: 14px;
    }

    p {
      font-size: 15px;
      font-weight: 300;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 30px;
      background: linear-gradient(135deg, var(--accent), #c04060);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(232,116,138,0.35);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(232,116,138,0.45);
    }

    .btn:hover .arrow { transform: translateX(4px); }
    .arrow { transition: transform 0.2s; }
