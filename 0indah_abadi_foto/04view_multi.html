<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R2 Storage Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0f;--surface:#12141a;--surface2:#1a1d26;--border:#252833;--accent:#4f8ef7;--accent2:#7c5ff5;--success:#3ecf8e;--danger:#f4645f;--warning:#f59e0b;--text:#e8eaf0;--muted:#6b7080;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;width:100%;max-width:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4}

/* HEADER */
header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,11,15,.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;width:100%}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo-text span{color:var(--accent)}
.header-status{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BURGER */
.burger-btn{display:none;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;flex-direction:column;gap:5px;transition:background .2s;flex-shrink:0}
.burger-btn:hover{background:var(--surface2)}
.burger-btn span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.burger-btn.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger-btn.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger-btn.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* LAYOUT */
.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 65px);width:100%}
.sidebar{border-right:1px solid var(--border);padding:24px 16px;background:var(--surface);display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;backdrop-filter:blur(4px)}
.main{display:flex;flex-direction:column;overflow:hidden;min-width:0;width:100%}

/* SIDEBAR ITEMS */
.sidebar-section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 12px;margin-top:8px;margin-bottom:4px}
.bucket-card{border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s ease;border:1px solid transparent;position:relative;overflow:hidden}
.bucket-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s;border-radius:12px}
.bucket-card:hover::before{opacity:.06}
.bucket-card.active{border-color:var(--accent);background:rgba(79,142,247,.08)}
.bucket-card.active::before{opacity:.1}
.bucket-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;position:relative}
.bucket-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bucket-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;padding-left:16px}
.bucket-count{font-family:var(--mono);font-size:10px;background:var(--border);padding:2px 7px;border-radius:20px;margin-left:auto}
.add-bucket-btn{margin-top:auto;padding:12px;border:1px dashed var(--border);border-radius:12px;background:none;color:var(--muted);cursor:pointer;font-family:var(--sans);font-size:13px;display:flex;align-items:center;gap:8px;justify-content:center;transition:all .2s}
.add-bucket-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.05)}

/* ACCOUNT GROUP */
.account-group{margin-bottom:16px}
.account-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:6px}
.account-name{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.account-size{font-family:var(--mono);font-size:10px;color:var(--muted)}
.account-progress{height:3px;background:var(--border);border-radius:2px;margin:0 4px 8px;overflow:hidden}
.account-progress-bar{height:100%;border-radius:2px;transition:width .5s ease}

/* TOOLBAR */
.toolbar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%}
.bucket-title{font-size:20px;font-weight:800;letter-spacing:-.5px;white-space:nowrap}
.bucket-url{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);padding:4px 10px;border-radius:6px;border:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,142,247,.3)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-danger{background:rgba(244,100,95,.12);color:var(--danger);border:1px solid rgba(244,100,95,.2)}
.btn-danger:hover{background:rgba(244,100,95,.2)}
.btn-sm{padding:6px 12px;font-size:12px}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 14px;flex:1;min-width:120px;max-width:280px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:13px;width:100%}
.search-box input::placeholder{color:var(--muted)}
.view-toggle{display:flex;background:var(--surface2);border-radius:8px;border:1px solid var(--border);overflow:hidden;flex-shrink:0}
.view-btn{padding:8px 12px;background:none;border:none;cursor:pointer;color:var(--muted);transition:all .2s;font-size:14px}
.view-btn.active{background:var(--border);color:var(--text)}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;padding-top:60px;width:100%}
.breadcrumb-bar{
  padding:10px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(10,11,15,.97);
  backdrop-filter:blur(16px);
  display:none;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  z-index:90;
  position:fixed;
  top:65px;
  left:280px;
  right:0;
  min-height:40px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
.breadcrumb-bar .breadcrumb-part{
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
  cursor:pointer;
  transition:color .15s;
  display:flex;
  align-items:center;
  gap:5px;
  padding:3px 6px;
  border-radius:6px;
  transition:all .15s;
}
.breadcrumb-bar .breadcrumb-part:hover{
  color:var(--accent);
  background:rgba(79,142,247,.1);
}
.breadcrumb-bar .breadcrumb-part.current{
  color:var(--text);
  font-weight:700;
  cursor:default;
}
.breadcrumb-bar .breadcrumb-part.current:hover{
  background:none;
  color:var(--text);
}
.breadcrumb-bar .breadcrumb-sep{
  color:var(--border);
  font-family:var(--mono);
  font-size:12px;
  user-select:none;
}
@media(max-width:768px){
  .breadcrumb-bar{left:0;top:57px;padding:8px 12px;}
}
.stats-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;width:100%}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.stat-val{font-weight:700;color:var(--accent)}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* FOLDER GRID */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:24px;width:100%}
.folder-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;font-weight:600;font-size:13px;min-width:0;overflow:hidden}
.folder-item:hover{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.07);transform:translateY(-1px)}
.folder-item:hover .act-btn{opacity:1!important}
.folder-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.folder-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.folder-arrow{color:var(--muted);font-size:14px;flex-shrink:0}

/* FILE GRID */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;width:100%}
.file-grid.list-view{display:flex;flex-direction:column;gap:4px}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;min-width:0}
.file-item:hover{border-color:rgba(79,142,247,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.file-item.selected{border-color:var(--accent);background:rgba(79,142,247,.08)}
.file-check{position:absolute;top:8px;left:8px;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--muted);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity .15s;font-size:10px}
.file-item:hover .file-check,.file-item.selected .file-check{opacity:1}
.file-item.selected .file-check{background:var(--accent);border-color:var(--accent);color:#fff}
.file-thumb{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.file-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.file-item:hover .file-thumb img{transform:scale(1.05)}
.file-thumb-icon{font-size:32px;opacity:.5}
.file-info{padding:8px}
.file-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.file-size{font-family:var(--mono);font-size:10px;color:var(--muted)}
.file-grid.list-view .file-item{border-radius:8px;display:flex;align-items:center;gap:12px;padding:10px 14px}
.file-grid.list-view .file-thumb{width:36px;height:36px;aspect-ratio:unset;border-radius:8px;flex-shrink:0}
.file-grid.list-view .file-thumb-icon{font-size:18px}
.file-grid.list-view .file-info{flex:1;padding:0;display:flex;align-items:center;gap:12px;min-width:0}
.file-grid.list-view .file-name{flex:1;font-size:13px;margin:0}
.file-date{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.file-actions-inline{display:flex;gap:6px;opacity:0;transition:opacity .15s}
.file-item:hover .file-actions-inline{opacity:1}

/* BUTTONS SMALL */
.act-btn{width:28px;height:28px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.act-btn:hover{background:var(--border);color:var(--text)}
.act-btn.del:hover{background:rgba(244,100,95,.15);color:var(--danger);border-color:rgba(244,100,95,.3)}

/* STATES */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text);opacity:.5}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:60px;color:var(--muted);font-family:var(--mono);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast-container{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9999;max-width:calc(100vw - 32px)}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.success{border-color:rgba(62,207,142,.3)}
.toast.error{border-color:rgba(244,100,95,.3)}
.toast.info{border-color:rgba(79,142,247,.3)}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:480px;animation:slideUp .25s ease;box-shadow:0 24px 64px rgba(0,0,0,.5)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s;margin-bottom:12px}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--muted)}
.modal-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}
.dropzone{border:2px dashed var(--border);border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.dropzone:hover,.dropzone.drag-over{border-color:var(--accent);background:rgba(79,142,247,.05)}
.dropzone-icon{font-size:36px;margin-bottom:12px;opacity:.5}
.dropzone p{font-size:13px;color:var(--muted);line-height:1.6}
.dropzone strong{color:var(--text)}
.upload-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.upload-item{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:8px;padding:10px 12px;font-size:13px}
.upload-prog{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.upload-prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}

/* PREVIEW */
.preview-modal{max-width:min(90vw,600px);max-height:90vh;background:var(--surface);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.preview-modal img{max-width:100%;max-height:60vh;object-fit:contain;border-radius:8px}
.preview-info{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.preview-url{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg);padding:6px 10px;border-radius:6px;border:1px solid var(--border);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;min-width:0}
.preview-url:hover{color:var(--accent);border-color:rgba(79,142,247,.4)}

/* LIGHTBOX */
.lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);z-index:600;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;touch-action:pan-y}
.lightbox-inner{position:relative;display:flex;flex-direction:column;align-items:center;max-width:100vw;max-height:100vh;padding:60px 70px 80px;user-select:none}
.lightbox-img-wrap{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:12px;cursor:zoom-in;max-width:calc(100vw - 140px);max-height:calc(100vh - 160px)}
.lightbox-img-wrap.zoomed{cursor:grab;overflow:visible}
.lightbox-img-wrap.zoomed.grabbing{cursor:grabbing}
.lightbox-img{display:block;max-width:calc(100vw - 140px);max-height:calc(100vh - 160px);object-fit:contain;border-radius:8px;transition:transform .25s ease;transform-origin:center center;pointer-events:none}
.lightbox-img-wrap.zoomed .lightbox-img{pointer-events:none}
.lightbox-close{position:fixed;top:16px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10}
.lightbox-close:hover{background:rgba(255,255,255,.2)}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);width:48px;height:64px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10}
.lightbox-nav:hover{background:rgba(255,255,255,.18)}
.lightbox-prev{left:12px}
.lightbox-next{right:12px}
.lightbox-nav:disabled{opacity:.2;cursor:not-allowed}
.lightbox-counter{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.6);background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;z-index:10}
.lightbox-name{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:600;color:rgba(255,255,255,.8);background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;z-index:10;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lightbox-actions{position:fixed;bottom:20px;right:20px;display:flex;gap:8px;z-index:10}
.lightbox-actions .btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}
.lightbox-actions .btn:hover{background:rgba(255,255,255,.2)}
.lightbox-zoom-hint{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.4);font-family:var(--mono);z-index:10;pointer-events:none;transition:opacity .3s}
@media(max-width:768px){
  .lightbox-inner{padding:50px 10px 70px}
  .lightbox-img{max-width:100vw;max-height:calc(100vh - 130px)}
  .lightbox-img-wrap{max-width:100vw;max-height:calc(100vh - 130px)}
  .lightbox-nav{width:36px;height:52px;font-size:16px}
  .lightbox-prev{left:4px}
  .lightbox-next{right:4px}
}

/* UPLOAD CONVERSION */
.conv-section{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:10px}
.conv-section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.conv-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.conv-item:last-child{border-bottom:none}
.conv-item label{flex:1;cursor:pointer;display:flex;align-items:center;gap:8px}
.conv-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
.conv-badge.from{background:rgba(245,158,11,.15);color:var(--warning)}
.conv-badge.arrow{color:var(--muted)}
.conv-badge.to{background:rgba(79,142,247,.15);color:var(--accent)}
.conv-badge.png{background:rgba(62,207,142,.15);color:var(--success)}
.conflict-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--mono);background:rgba(244,100,95,.12);color:var(--danger);border:1px solid rgba(244,100,95,.2);white-space:nowrap}
.conv-radio-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;margin-left:4px}
.conv-radio-group label{font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid var(--border);border-radius:8px;transition:all .2s}
.conv-radio-group label:hover{border-color:var(--accent);color:var(--text)}
.conv-radio-group input[type=radio]:checked + span{color:var(--accent)}
.conv-radio-group label:has(input:checked){border-color:var(--accent);background:rgba(79,142,247,.08);color:var(--accent)}

/* BULK BAR */
.bulk-bar{position:sticky;bottom:16px;display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:10px 16px;margin-top:16px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideUp .2s ease}
.bulk-count{font-size:13px;font-weight:600;flex:1}

/* AUTH */
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998;padding:16px}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:380px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.auth-icon{font-size:48px;margin-bottom:16px}
.auth-title{font-size:24px;font-weight:800;margin-bottom:8px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5}
.auth-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none;transition:border-color .2s;margin-bottom:12px;text-align:center;letter-spacing:3px}
.auth-input:focus{border-color:var(--accent)}
.auth-error{color:var(--danger);font-size:12px;margin-top:-4px;margin-bottom:8px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ===== MOBILE RESPONSIVE ===== */
@media(max-width:768px){
  .burger-btn{display:flex}
  .bucket-url{display:none}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;
    z-index:200;width:280px;padding-top:70px;
    transform:translateX(-100%);
    transition:transform .3s ease;
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .app{grid-template-columns:1fr}
  .folder-grid{grid-template-columns:repeat(2,1fr) !important}
  .file-grid:not(.list-view){grid-template-columns:repeat(2,1fr) !important}
  .content{padding:12px}
  .toolbar{padding:10px 12px;gap:8px}
  .bucket-title{font-size:16px}
  .btn{padding:8px 12px;font-size:12px}
  .breadcrumb-bar{padding:8px 12px;}
}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-icon">🔐</div>
    <div class="auth-title">R2 Dashboard</div>
    <div class="auth-sub">Masukkan password untuk mengakses<br>R2 Storage Manager</div>
    <input type="password" class="auth-input" id="authInput" placeholder="••••••">
    <div class="auth-error" id="authError"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="doAuth()">🚀 Masuk</button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="burger-btn" onclick="toggleSidebar()" id="burgerBtn">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">
      <div class="logo-icon">☁</div>
      <div class="logo-text">R2 <span>Manager</span></div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span id="headerStatus">Siap</span>
  </div>
</header>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Bucket</div>
    <div id="bucketList"></div>
    <button class="add-bucket-btn" onclick="showAddBucket()">+ Tambah Bucket</button>
  </div>
  <div class="main">
    <div class="toolbar" id="toolbar">
      <div class="bucket-title" id="mainTitle">Pilih Bucket</div>
    </div>
    <div class="breadcrumb-bar" id="breadcrumbBar"></div>
    <div class="content" id="mainContent">
      <div class="empty-state">
        <div class="empty-icon">☁️</div>
        <div class="empty-title">Belum ada bucket dipilih</div>
        <div style="font-size:14px;margin-top:8px">Pilih bucket dari sidebar atau tambah bucket baru</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div id="modalContainer"></div>

<script>
const APP_PASSWORD='admin';
let buckets=[
  {id:'lidan',name:'Lidan',color:'#4f8ef7',apiUrl:'https://indahabadi.my.id/api/r2_api_lidan',publicUrl:'https://assets.indahabadi.my.id',password:'admin'},
  {id:'tabi',name:'Tabi',color:'#3ecf8e',apiUrl:'https://tabi.my.id/api/r2_api_tabi',publicUrl:'https://file.tabi.my.id',password:'admin'},
  {id:'mobeli',name:'Mobeli',color:'#f59e0b',apiUrl:'https://mobeli.my.id/api/r2_api_mobeli',publicUrl:'https://file.mobeli.my.id',password:'admin'},
  {id:'talentmap',name:'Talentmap',color:'#f4645f',apiUrl:'https://talentmap.my.id/api/r2_api_talentmap',publicUrl:'https://file.talentmap.my.id',password:'admin'},
  {id:'fam',name:'Fam Cipta',color:'#a78bfa',apiUrl:'https://cipta.my.id/api/r2_api_fam',publicUrl:'https://fam.cipta.my.id',password:'admin'},
  {id:'img',name:'Img Cipta',color:'#fb7185',apiUrl:'https://cipta.my.id/api/r2_api_img',publicUrl:'https://img.cipta.my.id',password:'admin'},
  {id:'ciptapersada',name:'Ciptapersada',color:'#34d399',apiUrl:'https://ciptapersada.my.id/api/r2_api_lidan',publicUrl:'https://asset.ciptapersada.my.id',password:'admin'},
  {id:'mysupplier',name:'Mysupplier',color:'#60a5fa',apiUrl:'https://mysupplier.my.id/api/r2_api_lidan',publicUrl:'https://assets.mysupplier.my.id',password:'admin'},
  {id:'goblast',name:'Goblast',color:'#f472b6',apiUrl:'https://goblast.my.id/api/r2_api_lidan',publicUrl:'https://assets.goblast.my.id',password:'admin'},
  {id:'indahabadi',name:'Indahabadi',color:'#fb923c',apiUrl:'https://indahabadi.my.id/api/r2_api_lidan',publicUrl:'https://assets.indahabadi.my.id',password:'admin'},
];
// Konfigurasi akun - bucket dalam 1 akun dijumlahkan
const accounts = [
  { id:'akun-lidan',       name:'Akun Lidan',       bucketIds:['lidan','fam','img'],  limit: 10*1024*1024*1024 },
  { id:'akun-tabi',        name:'Akun Tabi',         bucketIds:['tabi'],               limit: 10*1024*1024*1024 },
  { id:'akun-mobeli',      name:'Akun Mobeli',       bucketIds:['mobeli'],             limit: 10*1024*1024*1024 },
  { id:'akun-talentmap',   name:'Akun Talentmap',    bucketIds:['talentmap'],          limit: 10*1024*1024*1024 },
  { id:'akun-ciptapersada',name:'Akun Ciptapersada', bucketIds:['ciptapersada'],       limit: 10*1024*1024*1024 },
  { id:'akun-mysupplier',  name:'Akun Mysupplier',   bucketIds:['mysupplier'],         limit: 10*1024*1024*1024 },
  { id:'akun-goblast',     name:'Akun Goblast',      bucketIds:['goblast'],            limit: 10*1024*1024*1024 },
  { id:'akun-indahabadi',  name:'Akun Indahabadi',   bucketIds:['indahabadi'],         limit: 10*1024*1024*1024 },
];
let activeBucket=null,currentPrefix='',selectedFiles=new Set(),viewMode='grid',searchQuery='';
let bucketFileCounts={},bucketSizes={},folderCache={};

function doAuth(){
  const val=document.getElementById('authInput').value;
  if(val===APP_PASSWORD){
    sessionStorage.setItem('r2_auth','1');
    document.getElementById('authScreen').style.display='none';
    loadSavedBuckets();renderBucketList();selectBucket('lidan');
  }else{
    document.getElementById('authError').textContent='Password salah!';
    document.getElementById('authInput').style.borderColor='var(--danger)';
    setTimeout(()=>{document.getElementById('authError').textContent='';document.getElementById('authInput').style.borderColor='var(--border)';},2000);
  }
}
document.getElementById('authInput').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
if(sessionStorage.getItem('r2_auth')==='1'){document.getElementById('authScreen').style.display='none';loadSavedBuckets();renderBucketList();selectBucket('lidan');}

function saveBuckets(){localStorage.setItem('r2_buckets',JSON.stringify(buckets));}
function loadSavedBuckets(){try{const s=localStorage.getItem('r2_buckets');if(s)buckets=JSON.parse(s);}catch(e){}}

function renderBucketList(){
  let html='';
  accounts.forEach(acc=>{
    const accBuckets=buckets.filter(b=>acc.bucketIds.includes(b.id));
    if(!accBuckets.length)return;
    
    // Hitung total size akun ini
    const totalSize=acc.bucketIds.reduce((s,bid)=>s+(bucketSizes[bid]||0),0);
    const hasSize=acc.bucketIds.some(bid=>bucketSizes[bid]!==undefined);
    const pct=Math.min(100,(totalSize/acc.limit)*100);
    const pctColor=pct>90?'var(--danger)':pct>70?'var(--warning)':'var(--success)';
    
    html+=`<div class="account-group">
      <div class="account-header">
        <span class="account-name">${acc.name}</span>
        ${hasSize?`<span class="account-size">${formatSize(totalSize)} / 10 GB</span>`:''}
      </div>
      ${hasSize?`<div class="account-progress">
        <div class="account-progress-bar" style="width:${pct}%;background:${pctColor}"></div>
      </div>`:''}
      ${accBuckets.map(b=>`
        <div class="bucket-card ${activeBucket?.id===b.id?'active':''}" onclick="selectBucket('${b.id}')">
          <div class="bucket-name">
            <div class="bucket-dot" style="background:${b.color}"></div>${b.name}
            <div class="bucket-count">${bucketFileCounts[b.id]!==undefined?bucketFileCounts[b.id]:'—'}</div>
          </div>
          <div class="bucket-meta">${b.publicUrl.replace('https://','')}</div>
          ${bucketSizes[b.id]!==undefined?`<div class="bucket-size-label" style="padding-left:16px;margin-top:2px;font-family:var(--mono);font-size:10px;color:var(--muted)">${formatSize(bucketSizes[b.id])}</div>`:''}
        </div>`).join('')}
    </div>`;
  });
  document.getElementById('bucketList').innerHTML=html;
}

async function selectBucket(id){
  activeBucket=buckets.find(b=>b.id===id);
  currentPrefix='';selectedFiles.clear();folderCache={};
  renderBucketList();updateToolbar();await loadFolder('');
  if(window.innerWidth<=768)closeSidebar();
}

function updateToolbar(){
  if(!activeBucket)return;
  document.getElementById('mainTitle').innerHTML=`<span style="color:${activeBucket.color}">${activeBucket.name}</span>`;
  const tb=document.getElementById('toolbar');
  tb.querySelectorAll('.toolbar-dynamic').forEach(e=>e.remove());
  const div=document.createElement('div');
  div.className='toolbar-dynamic';
  div.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap';
  div.innerHTML=`
    <div class="bucket-url">${activeBucket.publicUrl.replace('https://','')}</div>
    <div class="search-box"><span style="color:var(--muted)">🔍</span><input type="text" placeholder="Cari file..." oninput="doSearch(this.value)" id="searchInput"></div>
    <div class="view-toggle">
      <button class="view-btn ${viewMode==='grid'?'active':''}" onclick="setView('grid')">⊞</button>
      <button class="view-btn ${viewMode==='list'?'active':''}" onclick="setView('list')">☰</button>
    </div>
    <button class="btn btn-ghost" onclick="showCreateFolder()">📁 Folder</button>
    <button class="btn btn-primary" onclick="showUpload()">⬆ Upload</button>
    <button class="btn btn-ghost" onclick="refreshCurrent()" title="Refresh">↻</button>`;
  tb.appendChild(div);
}

async function loadFolder(prefix,forceRefresh=false){
  currentPrefix=prefix;selectedFiles.clear();
  const cacheKey=`${activeBucket.id}::${prefix}`;
  if(!forceRefresh&&folderCache[cacheKey]){renderFolderContent(folderCache[cacheKey],prefix);return;}
  showLoading();setStatus('Memuat...');
  try{
    const res=await fetch(`${activeBucket.apiUrl}?action=list&prefix=${encodeURIComponent(prefix)}`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const result=Array.isArray(data)?{files:data,folders:[]}:data;
    const base=activeBucket.publicUrl.replace(/\/$/,'');
    result.files=result.files.map(f=>({...f,url:`${base}/${f.key}`}));
    folderCache[cacheKey]=result;
    if(prefix==='')updateBucketCount(activeBucket.id);
    setStatus(`${result.files.length} file · ${result.folders.length} folder`);
    renderFolderContent(result,prefix);
  }catch(e){
    showContent(`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Gagal terhubung</div><div style="font-size:13px;margin-top:8px;color:var(--danger)">${e.message}</div><div style="font-size:12px;margin-top:12px;color:var(--muted)">Pastikan API sudah di-deploy dan domain benar</div><button class="btn btn-ghost" style="margin:16px auto 0;display:flex" onclick="loadFolder('${prefix}',true)">↻ Coba lagi</button></div>`);
    setStatus('Error');
  }
}

async function refreshCurrent(){const k=`${activeBucket.id}::${currentPrefix}`;delete folderCache[k];await loadFolder(currentPrefix,true);}

async function updateBucketCount(bid){
  try{
    const b=buckets.find(x=>x.id===bid);
    const res=await fetch(`${b.apiUrl}?action=list&prefix=&recursive=true`);
    if(!res.ok)return;
    const data=await res.json();
    const files=Array.isArray(data)?data:(data.files||[]);
    bucketFileCounts[bid]=files.length;
    bucketSizes[bid]=files.reduce((s,f)=>s+(f.size||0),0);
    renderBucketList();
  }catch(e){}
}

function renderFolderContent(data,prefix){
  const{files,folders}=data;
  const q=searchQuery.toLowerCase();
  // Filter file placeholder tersembunyi (.keep, .folder, .gitkeep dll)
  const hiddenFiles = /^\.(keep|folder|gitkeep|gitignore|DS_Store)$/i;
  const visibleFiles = files.filter(f => {
    const name = f.key.split('/').pop();
    return !hiddenFiles.test(name);
  });
  // Filter folder duplikat (nama folder sama dengan prefix saat ini)
  const visibleFolders = folders.filter(f => {
    const name = f.key.replace(prefix,'').replace(/\/$/,'');
    // Sembunyikan jika nama folder sama dengan folder saat ini (duplikat)
    const currentFolderName = prefix.replace(/\/$/,'').split('/').pop();
    return name !== '' && name !== currentFolderName;
  });
  const ff=q?visibleFiles.filter(f=>f.key.toLowerCase().includes(q)):visibleFiles;
  const fld=q?visibleFolders.filter(f=>f.key.toLowerCase().includes(q)):visibleFolders;

  const parts=prefix.split('/').filter(Boolean);
  // Build breadcrumb for sticky bar
  let breadHtml=`<span class="breadcrumb-part" onclick="loadFolder('')">🏠 root</span>`;
  let built='';
  parts.forEach((p,idx)=>{
    built+=p+'/';
    const path=built;
    const isLast=idx===parts.length-1;
    breadHtml+=`<span class="breadcrumb-sep">/</span><span class="breadcrumb-part${isLast?' current':''}" ${isLast?'':` onclick="loadFolder('${path}')"`}>${p}</span>`;
  });
  // Update breadcrumb bar yang ada di luar scroll container
  const bbEl=document.getElementById('breadcrumbBar');
  if(bbEl){bbEl.innerHTML=breadHtml;bbEl.style.display='flex';}

  const totalSize=ff.reduce((s,f)=>s+(f.size||0),0);
  const stats=`<div class="stats-bar">
    <div class="stat-pill">📁 <span class="stat-val">${fld.length}</span> folder</div>
    <div class="stat-pill">📄 <span class="stat-val">${ff.length}</span> file</div>
    <div class="stat-pill">💾 <span class="stat-val">${formatSize(totalSize)}</span></div>
  </div>`;

  let foldersHtml='';
  if(fld.length>0){
    foldersHtml=`<div class="section-label">📁 Folder</div><div class="folder-grid">${
      fld.map(f=>{const name=f.key.replace(prefix,'').replace(/\/$/,'');const fk=f.key.replace(/'/g,"\\'");return`<div class="folder-item" onclick="loadFolder('${f.key}')"><span style="font-size:22px">📁</span><span class="folder-name">${name}</span><button class="act-btn del" style="opacity:0;transition:opacity .15s;flex-shrink:0" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0" onclick="event.stopPropagation();confirmDeleteFolder('${fk}')" title="Hapus Folder">🗑️</button></div>`;}).join('')
    }</div>`;
  }

  let filesHtml='';
  if(ff.length>0){
    filesHtml=`<div class="section-label">📄 File</div><div class="file-grid ${viewMode==='list'?'list-view':''}">${ff.map(f=>renderFileItem(f,prefix)).join('')}</div>`;
  }

  if(fld.length===0&&ff.length===0){
    filesHtml=`<div class="empty-state"><div class="empty-icon">🗂️</div><div class="empty-title">${q?'Tidak ada hasil':'Folder kosong'}</div>${!q?`<button class="btn btn-primary" style="margin:16px auto 0;display:flex" onclick="showUpload()">⬆ Upload File</button>`:''}</div>`;
  }

  showContent(stats+foldersHtml+filesHtml);
  if(selectedFiles.size>0)renderBulkBar();
}

function renderFileItem(f,prefix){
  const name=f.key.split('/').pop()||f.key;
  const isImg=/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i.test(name);
  const isSelected=selectedFiles.has(f.key);
  const sk=f.key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const su=f.url.replace(/'/g,"\\'");
  const thumb=isImg?`<img data-src="${f.url}" class="lazy-thumb" onerror="this.parentElement.innerHTML='<div class=\\'file-thumb-icon\\'>${getFileIcon(name)}</div>'">`:`<div class="file-thumb-icon">${getFileIcon(name)}</div>`;
  if(viewMode==='grid'){
    return`<div class="file-item ${isSelected?'selected':''}" data-key="${f.key}">
      <div class="file-check" onclick="toggleSelect(event,'${sk}')">✓</div>
      <div class="file-thumb" onclick="openPreview('${sk}','${su}','${name}')">${thumb}</div>
      <div class="file-info"><div class="file-name" title="${name}">${name}</div><div class="file-size">${formatSize(f.size||0)}</div></div>
    </div>`;
  }else{
    const date=f.uploaded?new Date(f.uploaded).toLocaleDateString('id-ID'):'';
    return`<div class="file-item ${isSelected?'selected':''}" data-key="${f.key}">
      <div class="file-check" onclick="toggleSelect(event,'${sk}')">✓</div>
      <div class="file-thumb" onclick="openPreview('${sk}','${su}','${name}')">${thumb}</div>
      <div class="file-info">
        <div class="file-name" title="${f.key}">${f.key}</div>
        <div class="file-size">${formatSize(f.size||0)}</div>
        <div class="file-date">${date}</div>
        <div class="file-actions-inline">
          <button class="act-btn" onclick="copyUrl('${su}')" title="Copy URL">📋</button>
          <button class="act-btn" onclick="showRename('${sk}')" title="Rename">✏️</button>
          <button class="act-btn del" onclick="confirmDelete('${sk}')" title="Hapus">🗑️</button>
        </div>
      </div>
    </div>`;
  }
}

function doSearch(q){
  searchQuery=q;
  const k=`${activeBucket.id}::${currentPrefix}`;
  if(folderCache[k])renderFolderContent(folderCache[k],currentPrefix);
}

function setView(mode){
  viewMode=mode;
  document.querySelectorAll('.view-btn').forEach((b,i)=>b.classList.toggle('active',(mode==='grid'&&i===0)||(mode==='list'&&i===1)));
  const k=`${activeBucket.id}::${currentPrefix}`;
  if(folderCache[k])renderFolderContent(folderCache[k],currentPrefix);
}

function toggleSelect(e,key){
  e.stopPropagation();
  if(selectedFiles.has(key))selectedFiles.delete(key);else selectedFiles.add(key);
  const item=document.querySelector(`[data-key="${key}"]`);
  if(item){item.classList.toggle('selected',selectedFiles.has(key));const c=item.querySelector('.file-check');if(c)c.style.opacity=selectedFiles.has(key)?'1':'';}
  const bar=document.getElementById('bulkBar');
  if(selectedFiles.size>0){if(!bar)renderBulkBar();else bar.querySelector('.bulk-count').textContent=`✓ ${selectedFiles.size} dipilih`;}
  else{bar?.remove();}
}

function renderBulkBar(){
  document.getElementById('bulkBar')?.remove();
  const bar=document.createElement('div');bar.id='bulkBar';bar.className='bulk-bar';
  bar.innerHTML=`<div class="bulk-count">✓ ${selectedFiles.size} dipilih</div>
    <button class="btn btn-ghost btn-sm" onclick="selectedFiles.clear();document.getElementById('bulkBar')?.remove();document.querySelectorAll('.file-item.selected').forEach(e=>e.classList.remove('selected'))">Batal</button>
    <button class="btn btn-danger btn-sm" onclick="bulkDelete()">🗑 Hapus</button>`;
  document.getElementById('mainContent').appendChild(bar);
}

async function bulkDelete(){
  if(!confirm(`Hapus ${selectedFiles.size} file?`))return;
  let ok=0;
  for(const key of selectedFiles){try{await apiPost('delete',{key});ok++;}catch(e){}}
  selectedFiles.clear();showToast(`${ok} file dihapus`,'success');await refreshCurrent();
}

function openPreview(key,url,name){
  const isImg=/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i.test(name);
  if(isImg){openLightbox(key,url,name);return;}
  showModal(`<div class="preview-modal">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${name}</div>
      <button class="act-btn" style="margin-left:8px;flex-shrink:0" onclick="closeModal()">✕</button>
    </div>
    <div style="padding:40px;text-align:center"><div style="font-size:64px;margin-bottom:16px">${getFileIcon(name)}</div><div style="font-size:16px;font-weight:700">${name}</div></div>
    <div class="preview-info">
      <div class="preview-url" onclick="copyUrl('${url}')">${url}</div>
      <a href="${url}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none">🔗 Buka</a>
      <button class="btn btn-primary btn-sm" onclick="copyUrl('${url}')">📋 Copy</button>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="closeModal();showRename('${key}')">✏️ Rename</button>
      <button class="btn btn-danger btn-sm" onclick="closeModal();confirmDelete('${key}')">🗑 Hapus</button>
    </div>
  </div>`,true);
}

// ===== LIGHTBOX =====
let lightboxImages=[];
let lightboxIndex=0;
let lightboxZoom=false;
let lightboxZoomScale=2.5;
let lbDragStart=null,lbImgPos={x:0,y:0};
let lbSwipeStart=null,lbSwipeMoved=false;

function buildImageList(){
  const items=document.querySelectorAll('.file-item[data-key]');
  const imgs=[];
  items.forEach(el=>{
    const key=el.getAttribute('data-key');
    const name=key.split('/').pop();
    if(!/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i.test(name))return;
    const imgEl=el.querySelector('.file-thumb img');
    // Ambil URL asli: dataset.src jika belum load, imgEl.src jika sudah
    let url=imgEl?(imgEl.dataset.src||imgEl.src):'';
    imgs.push({key,url,name});
  });
  return imgs;
}

function openLightbox(key,url,name){
  lightboxImages=buildImageList();
  lightboxIndex=lightboxImages.findIndex(x=>x.key===key);
  if(lightboxIndex<0){lightboxImages=[{key,url,name}];lightboxIndex=0;}
  renderLightbox();
}

function renderLightbox(){
  document.getElementById('lightboxOverlay')?.remove();
  document.removeEventListener('keydown',document._lbKeyHandler);
  document.removeEventListener('mousemove',lbMouseMove);
  document.removeEventListener('mouseup',lbMouseUp);

  const item=lightboxImages[lightboxIndex];
  lightboxZoom=false;lbImgPos={x:0,y:0};

  const overlay=document.createElement('div');
  overlay.id='lightboxOverlay';
  overlay.className='lightbox-overlay';
  const sk=item.key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const su=item.url.replace(/'/g,"\\'");
  overlay.innerHTML=`
    <div class="lightbox-name">${item.name}</div>
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev" ${lightboxIndex===0?'disabled':''}>‹</button>
    <div class="lightbox-inner">
      <div class="lightbox-img-wrap" id="lbImgWrap">
        <img class="lightbox-img" id="lbImg" src="${item.url}" alt="${item.name}" draggable="false">
      </div>
    </div>
    <button class="lightbox-nav lightbox-next" id="lbNext" ${lightboxIndex===lightboxImages.length-1?'disabled':''}>›</button>
    <div class="lightbox-counter">${lightboxIndex+1} / ${lightboxImages.length}</div>
    <div class="lightbox-zoom-hint" id="lbHint">klik gambar untuk zoom · geser untuk navigasi</div>
    <div class="lightbox-actions">
      <a href="${item.url}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none" onclick="event.stopPropagation()">🔗 Buka</a>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();copyUrl('${su}')">📋 Copy URL</button>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();closeLightboxGoToCard();showRename('${sk}')">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();closeLightboxGoToCard();confirmDelete('${sk}')">🗑</button>
    </div>`;
  overlay._lastKey=item.key;
  document.body.appendChild(overlay);

  // Close on overlay background click
  overlay.addEventListener('click',e=>{
    if(e.target===overlay)closeLightboxGoToCard();
  });
  document.getElementById('lbClose').onclick=e=>{e.stopPropagation();closeLightboxGoToCard();};
  document.getElementById('lbPrev').onclick=e=>{e.stopPropagation();lbGo(-1);};
  document.getElementById('lbNext').onclick=e=>{e.stopPropagation();lbGo(1);};

  // Zoom toggle on image wrap
  const wrap=document.getElementById('lbImgWrap');
  wrap.addEventListener('click',e=>{
    e.stopPropagation();
    if(lbSwipeMoved){lbSwipeMoved=false;return;}
    if(!lightboxZoom){
      lightboxZoom=true;lbImgPos={x:0,y:0};
      wrap.classList.add('zoomed');
      applyLbTransform();
      document.getElementById('lbHint').style.opacity='0';
    }else{
      lightboxZoom=false;lbImgPos={x:0,y:0};
      wrap.classList.remove('zoomed','grabbing');
      applyLbTransform();
      document.getElementById('lbHint').style.opacity='1';
    }
  });

  // Mouse drag while zoomed
  wrap.addEventListener('mousedown',e=>{
    if(!lightboxZoom)return;
    e.preventDefault();lbDragStart={x:e.clientX-lbImgPos.x,y:e.clientY-lbImgPos.y};
    wrap.classList.add('grabbing');
  });
  document.addEventListener('mousemove',lbMouseMove);
  document.addEventListener('mouseup',lbMouseUp);

  // Touch: swipe + pinch-zoom
  let touchStartX=0,touchStartY=0,touchStartTime=0,pinchDist0=0;
  overlay.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      return;
    }
    touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
    touchStartTime=Date.now();lbSwipeMoved=false;
    if(lightboxZoom)lbDragStart={x:touchStartX-lbImgPos.x,y:touchStartY-lbImgPos.y};
  },{passive:true});
  overlay.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(d-pinchDist0>25&&!lightboxZoom){lightboxZoom=true;lbImgPos={x:0,y:0};wrap.classList.add('zoomed');applyLbTransform();}
      else if(pinchDist0-d>25&&lightboxZoom){lightboxZoom=false;lbImgPos={x:0,y:0};wrap.classList.remove('zoomed');applyLbTransform();}
      return;
    }
    const dx=e.touches[0].clientX-touchStartX;
    const dy=e.touches[0].clientY-touchStartY;
    if(Math.abs(dx)>8||Math.abs(dy)>8)lbSwipeMoved=true;
    if(lightboxZoom&&lbDragStart){
      lbImgPos={x:e.touches[0].clientX-lbDragStart.x,y:e.touches[0].clientY-lbDragStart.y};
      applyLbTransform();e.preventDefault();
    }
  },{passive:false});
  overlay.addEventListener('touchend',e=>{
    if(lightboxZoom){lbDragStart=null;return;}
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dt=Date.now()-touchStartTime;
    if(lbSwipeMoved&&Math.abs(dx)>50&&dt<500){
      if(dx<0)lbGo(1);else lbGo(-1);
      lbSwipeMoved=false;return;
    }
    // If barely moved and short tap on overlay background = close
    if(!lbSwipeMoved&&dt<250){
      const t=e.target;
      if(t===overlay||t===document.getElementById('lbImgWrap')||t===document.getElementById('lbImg')){}
      // let click handler deal with it
    }
    lbSwipeMoved=false;
  });

  document._lbKeyHandler=e=>{
    if(e.key==='ArrowRight')lbGo(1);
    else if(e.key==='ArrowLeft')lbGo(-1);
    else if(e.key==='Escape')closeLightboxGoToCard();
  };
  document.addEventListener('keydown',document._lbKeyHandler);
}

function lbMouseMove(e){
  if(!lightboxZoom||!lbDragStart)return;
  lbImgPos={x:e.clientX-lbDragStart.x,y:e.clientY-lbDragStart.y};
  applyLbTransform();
}
function lbMouseUp(){lbDragStart=null;document.getElementById('lbImgWrap')?.classList.remove('grabbing');}
function applyLbTransform(){
  const img=document.getElementById('lbImg');if(!img)return;
  if(lightboxZoom)img.style.transform=`translate(${lbImgPos.x}px,${lbImgPos.y}px) scale(${lightboxZoomScale})`;
  else img.style.transform='translate(0,0) scale(1)';
}
function lbGo(dir){
  const ni=lightboxIndex+dir;
  if(ni<0||ni>=lightboxImages.length)return;

  const overlay=document.getElementById('lightboxOverlay');
  const wrap=document.getElementById('lbImgWrap');
  const img=document.getElementById('lbImg');
  if(!overlay||!wrap||!img)return;

  // Fade out gambar saja — overlay TIDAK dihapus, background gelap tetap ada
  wrap.style.transition='opacity .15s ease, transform .15s ease';
  wrap.style.opacity='0';
  wrap.style.transform=`translateX(${dir>0?'-40px':'40px'})`;

  setTimeout(()=>{
    lightboxIndex=ni;
    const item=lightboxImages[lightboxIndex];
    overlay._lastKey=item.key;

    // Preload gambar baru
    const newImg=new Image();
    newImg.onload=()=>{
      img.src=item.url;
      img.alt=item.name;

      // Update UI teks
      const nameEl=document.getElementById('lbName');
      if(nameEl)nameEl.textContent=item.name;
      const counter=overlay.querySelector('.lightbox-counter');
      if(counter)counter.textContent=`${lightboxIndex+1} / ${lightboxImages.length}`;
      const prevBtn=document.getElementById('lbPrev');
      const nextBtn=document.getElementById('lbNext');
      if(prevBtn)prevBtn.disabled=lightboxIndex===0;
      if(nextBtn)nextBtn.disabled=lightboxIndex===lightboxImages.length-1;

      // Update action buttons
      const sk=item.key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const su=item.url.replace(/'/g,"\\'");
      const actions=overlay.querySelector('.lightbox-actions');
      if(actions){
        actions.innerHTML=`
          <a href="${item.url}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none" onclick="event.stopPropagation()">🔗 Buka</a>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();copyUrl('${su}')">📋 Copy URL</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();closeLightboxGoToCard();showRename('${sk}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();closeLightboxGoToCard();confirmDelete('${sk}')">🗑</button>`;
      }

      // Reset zoom
      lightboxZoom=false;lbImgPos={x:0,y:0};
      img.style.transform='translate(0,0) scale(1)';
      wrap.classList.remove('zoomed','grabbing');

      // Fade in dari arah berlawanan
      wrap.style.transition='none';
      wrap.style.transform=`translateX(${dir>0?'40px':'-40px'})`;
      wrap.style.opacity='0';
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          wrap.style.transition='opacity .2s ease, transform .2s ease';
          wrap.style.opacity='1';
          wrap.style.transform='translateX(0)';
        });
      });
    };
    newImg.onerror=()=>{
      // Tetap lanjut walau gagal load
      img.src=item.url;
      wrap.style.opacity='1';
      wrap.style.transform='translateX(0)';
    };
    newImg.src=item.url;
  },150);
}
function closeLightboxGoToCard(){
  const overlay=document.getElementById('lightboxOverlay');
  const lastKey=overlay?._lastKey;
  document.removeEventListener('keydown',document._lbKeyHandler);
  document.removeEventListener('mousemove',lbMouseMove);
  document.removeEventListener('mouseup',lbMouseUp);
  overlay?.remove();
  if(lastKey){
    setTimeout(()=>{
      const card=document.querySelector(`.file-item[data-key="${CSS.escape(lastKey)}"]`);
      if(card){
        card.scrollIntoView({behavior:'smooth',block:'center'});
        card.style.transition='outline .1s';
        card.style.outline='2px solid var(--accent)';
        setTimeout(()=>{card.style.outline='';},1200);
      }
    },60);
  }
}



function showRenameFolder(folderKey){
  const oldName=folderKey.replace(/\/$/,'').split('/').pop();
  const parentPrefix=folderKey.split('/').slice(0,-2).join('/')+(folderKey.split('/').length>2?'/':'');
  showModal(`<div class="modal-title">✏️ Rename Folder</div>
    <div class="modal-label">Nama folder saat ini</div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--bg);padding:10px 14px;border-radius:8px;margin-bottom:16px;word-break:break-all">${folderKey}</div>
    <div class="modal-label">Nama baru</div>
    <input class="modal-input" id="newFolderNameInput" value="${oldName}" placeholder="nama-folder-baru">
    <div style="font-size:12px;color:var(--warning);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 12px;margin-bottom:4px">
      ⚠️ Semua file di dalam folder akan dipindahkan. Proses ini bisa memakan waktu jika folder berisi banyak file.
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="doRenameFolder('${folderKey}','${parentPrefix}')">✏️ Rename</button>
    </div>`);
  setTimeout(()=>document.getElementById('newFolderNameInput')?.focus(),100);
}

async function doRenameFolder(oldFolderKey, parentPrefix){
  const newName=document.getElementById('newFolderNameInput').value.trim();
  if(!newName){showToast('Nama folder tidak boleh kosong','error');return;}
  const newFolderKey=parentPrefix+newName+'/';
  if(newFolderKey===oldFolderKey){closeModal();return;}
  
  closeModal();
  setStatus('Memindahkan folder...');
  
  try{
    // Get all files in old folder recursively
    const res=await fetch(`${activeBucket.apiUrl}?action=list&prefix=${encodeURIComponent(oldFolderKey)}&recursive=true`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const files=Array.isArray(data)?data:(data.files||[]);
    
    if(files.length===0){
      // Empty folder - just create new one with placeholder
      const fd=new FormData();
      fd.append('file',new Blob([''],{type:'text/plain'}),'.keep');
      fd.append('customName',newFolderKey+'.keep');
      await fetch(`${activeBucket.apiUrl}?action=upload`,{method:'POST',headers:{'X-Custom-Auth':activeBucket.password},body:fd});
    } else {
      // Rename all files: copy to new path then delete old
      let done=0;
      for(const f of files){
        const newKey=newFolderKey+f.key.slice(oldFolderKey.length);
        try{
          await apiPost('rename',{oldKey:f.key,newKey,keepOriginal:false});
          done++;
          setStatus(`Memindahkan ${done}/${files.length} file...`);
        }catch(e){}
      }
    }
    
    // Clear cache
    delete folderCache[`${activeBucket.id}::${oldFolderKey}`];
    delete folderCache[`${activeBucket.id}::${parentPrefix}`];
    delete folderCache[`${activeBucket.id}::${currentPrefix}`];
    
    showToast(`Folder berhasil direname ke "${newName}"!`,'success');
    await loadFolder(parentPrefix,true);
  }catch(e){
    showToast(`Gagal: ${e.message}`,'error');
    setStatus('Error');
  }
}

function showCreateFolder(){
  const base=currentPrefix;
  showModal(`<div class="modal-title">📁 Buat Folder Baru</div>
    <div class="modal-label">Lokasi</div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--bg);padding:10px 14px;border-radius:8px;margin-bottom:16px">${base||'/ (root)'}</div>
    <div class="modal-label">Nama Folder</div>
    <input class="modal-input" id="folderNameInput" placeholder="contoh: foto-2024" autofocus>
    <div style="font-size:12px;color:var(--muted);margin-top:-4px;margin-bottom:8px">Hanya huruf, angka, tanda hubung, dan garis bawah</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="doCreateFolder()">📁 Buat</button>
    </div>`);
  setTimeout(()=>document.getElementById('folderNameInput')?.focus(),100);
}

async function doCreateFolder(){
  const name=document.getElementById('folderNameInput').value.trim().replace(/\/+$/,'');
  if(!name){showToast('Nama folder tidak boleh kosong','error');return;}
  if(/[<>:"|?*\\]/.test(name)){showToast('Nama folder mengandung karakter tidak valid','error');return;}
  const placeholder=currentPrefix+name+'/.keep';
  const fd=new FormData();
  const emptyBlob=new Blob([''],{type:'text/plain'});
  fd.append('file',emptyBlob,'.keep');
  fd.append('customName',placeholder);
  try{
    const res=await fetch(`${activeBucket.apiUrl}?action=upload`,{method:'POST',headers:{'X-Custom-Auth':activeBucket.password},body:fd});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    showToast(`Folder "${name}" berhasil dibuat!`,'success');
    closeModal();refreshCurrent();
  }catch(e){showToast(`Gagal: ${e.message}`,'error');}
}

function confirmDeleteFolder(folderKey){
  const name=folderKey.replace(/\/$/,'').split('/').pop();
  showModal(`<div class="modal-title">🗑️ Hapus Folder</div>
    <div style="font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:12px">Folder <strong style="color:var(--text)">${name}</strong> dan <strong style="color:var(--danger)">semua isinya</strong> akan dihapus permanen.</div>
    <div style="background:rgba(244,100,95,.08);border:1px solid rgba(244,100,95,.2);border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--danger);font-weight:700;margin-bottom:8px">⚠️ TIDAK DAPAT DIBATALKAN</div>
      <div style="font-size:13px;color:var(--muted)">Ketik nama folder untuk konfirmasi:</div>
      <div style="font-family:var(--mono);font-size:13px;color:var(--warning);margin:6px 0"><strong>${name}</strong></div>
    </div>
    <input class="modal-input" id="deleteFolderConfirm" placeholder="Ketik: ${name}" oninput="checkDeleteFolderConfirm('${name}')">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-danger" id="deleteFolderBtn" disabled style="opacity:.4;cursor:not-allowed" onclick="doDeleteFolder('${folderKey}')">🗑 Hapus Folder</button>
    </div>`);
  setTimeout(()=>document.getElementById('deleteFolderConfirm')?.focus(),100);
}

function checkDeleteFolderConfirm(name){
  const val=document.getElementById('deleteFolderConfirm').value;
  const btn=document.getElementById('deleteFolderBtn');
  if(btn){
    const match=val===name;
    btn.disabled=!match;
    btn.style.opacity=match?'1':'0.4';
    btn.style.cursor=match?'pointer':'not-allowed';
  }
}

async function doDeleteFolder(folderKey){
  setStatus('Menghapus folder...');
  try{
    // Get all files in folder (recursive)
    const res=await fetch(`${activeBucket.apiUrl}?action=list&prefix=${encodeURIComponent(folderKey)}&recursive=true`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const files=Array.isArray(data)?data:(data.files||[]);
    
    // Also get files via non-recursive to catch subfolders
    let allKeys=[...files.map(f=>f.key)];
    
    // Delete all
    let ok=0;
    for(const key of allKeys){
      try{await apiPost('delete',{key});ok++;}catch(e){}
    }
    const folderName=folderKey.replace(/\/$/,'').split('/').pop();
    showToast(`Folder "${folderName}" dihapus (${ok} file)`, 'success');
    closeModal();
    // Clear cache for parent
    const parentPrefix=folderKey.split('/').slice(0,-2).join('/')+(folderKey.split('/').length>2?'/':'');
    delete folderCache[`${activeBucket.id}::${parentPrefix}`];
    delete folderCache[`${activeBucket.id}::${folderKey}`];
    await loadFolder(currentPrefix,true);
  }catch(e){showToast(`Gagal: ${e.message}`,'error');}
}

function showUpload(){
  let uploadFiles=[];
  let conversionChoices={}; // key: file index, val: 'convert'|'keep'
  let conflictChoices={}; // key: final filename, val: 'overwrite'|'rename'
  let uploadPhase='select'; // 'select' | 'confirm'

  showModal(`<div class="modal-title">⬆️ Upload File</div>
    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <div class="dropzone-icon">📂</div>
      <p><strong>Klik untuk pilih file</strong> atau drag & drop</p>
      <p style="margin-top:6px;font-size:12px">Semua format didukung</p>
    </div>
    <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileSelect(event)">
    <div class="modal-label">Folder tujuan</div>
    <input class="modal-input" id="uploadFolder" placeholder="contoh: gambar/2024" value="${currentPrefix}">
    <div class="upload-list" id="uploadList" style="max-height:180px;overflow-y:auto"></div>
    <div id="convSection"></div>
    <div class="modal-actions" id="uploadActions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="startUploadBtn" onclick="proceedUpload()" style="display:none">⬆ Upload</button>
    </div>`);

  setTimeout(()=>{
    const dz=document.getElementById('dropzone');if(!dz)return;
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(Array.from(e.dataTransfer.files));});
  },100);

  window.handleFileSelect=e=>handleFiles(Array.from(e.target.files));

  window.handleFiles=files=>{
    uploadFiles=files;conversionChoices={};conflictChoices={};uploadPhase='select';
    renderUploadList();
    document.getElementById('startUploadBtn').style.display='flex';
  };

  function renderUploadList(){
    const listEl=document.getElementById('uploadList');
    if(!listEl)return;
    listEl.innerHTML=uploadFiles.map((f,i)=>`
      <div class="upload-item" id="uploadItem${i}">
        <span>${getFileIcon(f.name)}</span>
        <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>
        <span style="font-size:11px;color:var(--muted)">${formatSize(f.size)}</span>
        <div class="upload-prog"><div class="upload-prog-bar" id="prog${i}" style="width:0%"></div></div>
      </div>`).join('');
    renderConvSection();
  }

  function renderConvSection(){
    const convEl=document.getElementById('convSection');if(!convEl)return;
    const pngFiles=uploadFiles.filter(f=>/\.png$/i.test(f.name));
    const nonImgConvertibles=uploadFiles.filter(f=>/\.(jpg|jpeg|webp|bmp|gif|tiff|tif)$/i.test(f.name));
    // jpg files that will be re-encoded (might create same name conflict)
    let html='';
    if(pngFiles.length>0||nonImgConvertibles.length>0){
      html+=`<div class="conv-section">`;
      html+=`<div class="conv-section-title">🖼️ Konversi Gambar</div>`;

      // Non-PNG image files: auto convert to JPEG, just show info
      if(nonImgConvertibles.length>0){
        html+=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px;padding:8px;background:rgba(79,142,247,.06);border-radius:8px;border:1px solid rgba(79,142,247,.15)">
          ✅ <strong>${nonImgConvertibles.length} file</strong> non-PNG akan otomatis dikonversi ke <span style="color:var(--accent)">JPEG</span> (kualitas 85%) untuk menghemat ukuran.
        </div>`;
        // Check potential name conflicts within batch
        const nameMap={};
        uploadFiles.forEach((f,i)=>{
          let targetName=f.name;
          if(/\.(webp|bmp|gif|tiff|tif)$/i.test(f.name))targetName=f.name.replace(/\.[^.]+$/,'.jpg');
          if(!nameMap[targetName])nameMap[targetName]=[];
          nameMap[targetName].push({f,i,orig:f.name});
        });
        const conflicts=Object.entries(nameMap).filter(([k,v])=>v.length>1);
        if(conflicts.length>0){
          html+=`<div style="font-size:12px;color:var(--warning);margin-bottom:8px;padding:8px;background:rgba(245,158,11,.06);border-radius:8px;border:1px solid rgba(245,158,11,.2)">⚠️ Konflik nama terdeteksi dalam batch ini:</div>`;
          conflicts.forEach(([name,items])=>{
            const cid='conflict_'+name.replace(/[^a-z0-9]/gi,'_');
            const cur=conflictChoices[name]||'rename';
            html+=`<div class="conv-item" style="flex-direction:column;align-items:flex-start">
              <div style="font-family:var(--mono);font-size:12px;color:var(--warning);margin-bottom:6px">
                ${items.map(x=>`<span class="conv-badge from">${x.orig}</span>`).join(' & ')} → <span class="conv-badge to">${name}</span>
              </div>
              <div class="conv-radio-group">
                <label><input type="radio" name="${cid}" value="rename" ${cur==='rename'?'checked':''} onchange="conflictChoices['${name}']=this.value"> <span>Beri nama otomatis (aman)</span></label>
                <label><input type="radio" name="${cid}" value="overwrite" ${cur==='overwrite'?'checked':''} onchange="conflictChoices['${name}']=this.value"> <span>Timpa (pakai yg terakhir)</span></label>
              </div>
            </div>`;
          });
        }
      }

      // PNG files: ask per file or with checkboxes
      if(pngFiles.length===1){
        const f=pngFiles[0];const i=uploadFiles.indexOf(f);
        const cur=conversionChoices[i]!==undefined?conversionChoices[i]:'keep';
        const cid='png_conv_'+i;
        html+=`<div class="conv-item" style="flex-direction:column;align-items:flex-start">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span class="conv-badge png">PNG</span>
            <span style="font-size:13px;font-weight:600">${f.name}</span>
            <span style="font-size:11px;color:var(--muted)">${formatSize(f.size)}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px">PNG mendukung background transparan. Konversi ke JPEG akan menghapus transparansi.</div>
          <div class="conv-radio-group">
            <label><input type="radio" name="${cid}" value="keep" ${cur==='keep'?'checked':''} onchange="conversionChoices[${i}]=this.value"> <span>Pertahankan PNG</span></label>
            <label><input type="radio" name="${cid}" value="convert" ${cur==='convert'?'checked':''} onchange="conversionChoices[${i}]=this.value"> <span>Konversi ke JPEG</span></label>
          </div>
        </div>`;
      } else if(pngFiles.length>1){
        html+=`<div style="font-size:12px;color:var(--muted);margin-bottom:10px">PNG mendukung background transparan. Pilih file mana yang perlu dikonversi ke JPEG:</div>`;
        pngFiles.forEach(f=>{
          const i=uploadFiles.indexOf(f);
          const checked=conversionChoices[i]==='convert';
          html+=`<div class="conv-item">
            <label style="flex:1;cursor:pointer;display:flex;align-items:center;gap:8px">
              <input type="checkbox" ${checked?'checked':''} onchange="conversionChoices[${i}]=this.checked?'convert':'keep'">
              <span class="conv-badge png">PNG</span>
              <span style="font-size:13px">${f.name}</span>
              <span style="font-size:11px;color:var(--muted)">${formatSize(f.size)}</span>
            </label>
          </div>`;
        });
      }
      html+=`</div>`;
    }
    convEl.innerHTML=html;
    // Make conflictChoices accessible in radio handlers
    window.conflictChoices=conflictChoices;
    window.conversionChoices=conversionChoices;
  }

  window.proceedUpload=async()=>{
    const folder=document.getElementById('uploadFolder').value.trim();
    const base=folder?(folder.endsWith('/')?folder:folder+'/'):'';
    document.getElementById('startUploadBtn').disabled=true;
    document.getElementById('startUploadBtn').textContent='⏳ Mengupload...';

    // Build final list: {file, targetName, convert}
    const tasks=[];
    const usedNames={};

    for(let i=0;i<uploadFiles.length;i++){
      const f=uploadFiles[i];
      const ext=f.name.split('.').pop().toLowerCase();
      const isImg=/^(jpg|jpeg|png|gif|webp|bmp|tiff|tif)$/.test(ext);
      let convert=false;
      let targetName=f.name;

      if(isImg){
        if(/^png$/i.test(ext)){
          convert=(window.conversionChoices[i]==='convert');
        } else if(/^(jpg|jpeg)$/i.test(ext)){
          convert=true; // re-encode for size reduction
        } else if(/^(webp|bmp|gif|tiff|tif)$/i.test(ext)){
          convert=true;
        }
      }
      if(convert&&!/^png$/i.test(ext)){
        targetName=f.name.replace(/\.[^.]+$/,'.jpg');
      } else if(convert&&/^png$/i.test(ext)){
        targetName=f.name.replace(/\.png$/i,'.jpg');
      }

      // Conflict resolution
      const choice=window.conflictChoices[targetName]||'rename';
      if(usedNames[targetName]!==undefined){
        if(choice==='rename'){
          let c=1,nn=targetName;
          const nBase=targetName.replace(/\.[^.]+$/,'');
          const nExt=targetName.includes('.')?'.'+targetName.split('.').pop():'';
          while(usedNames[nn]!==undefined){nn=`${nBase}_${c}${nExt}`;c++;}
          targetName=nn;
        }
        // overwrite: keep same name, last one wins
      }
      usedNames[targetName]=true;
      tasks.push({f,targetName,convert});
    }

    let ok=0;
    for(let i=0;i<tasks.length;i++){
      const{f,targetName,convert}=tasks[i];
      const progEl=document.getElementById(`prog${i}`);
      try{
        let fileToUpload=f;
        if(convert){
          fileToUpload=await compressToJpeg(f,0.85);
          // rename the Blob as targetName
        }
        const fd=new FormData();
        fd.append('file',fileToUpload,targetName);
        fd.append('customName',base+targetName);
        const res=await fetch(`${activeBucket.apiUrl}?action=upload`,{method:'POST',headers:{'X-Custom-Auth':activeBucket.password},body:fd});
        if(res.ok){if(progEl){progEl.style.width='100%';progEl.style.background='var(--success)';}ok++;}
        else throw new Error(`HTTP ${res.status}`);
      }catch(e){if(progEl){progEl.style.width='100%';progEl.style.background='var(--danger)';}}
    }
    showToast(`${ok}/${tasks.length} file diupload`,ok>0?'success':'error');
    setTimeout(()=>{closeModal();refreshCurrent();},800);
  };

  window.handleFileSelect=e=>handleFiles(Array.from(e.target.files));
}

async function compressToJpeg(file,quality=0.85){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      canvas.width=img.width;canvas.height=img.height;
      const ctx=canvas.getContext('2d');
      // Fill white background (for PNG transparency)
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0);
      canvas.toBlob(blob=>{
        URL.revokeObjectURL(url);
        if(blob)resolve(blob);
        else reject(new Error('Gagal kompres gambar'));
      },'image/jpeg',quality);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Gagal load gambar'));};
    img.src=url;
  });
}

async function doRename(oldKey){

  const parts=oldKey.split('/');parts[parts.length-1]=newName;const newKey=parts.join('/');
  try{await apiPost('rename',{oldKey,newKey,keepOriginal});showToast('File berhasil direname','success');closeModal();refreshCurrent();}
  catch(e){showToast(`Gagal: ${e.message}`,'error');}
}

async function apiPost(action,body){
  const res=await fetch(`${activeBucket.apiUrl}?action=${action}`,{method:'POST',headers:{'Content-Type':'application/json','X-Custom-Auth':activeBucket.password},body:JSON.stringify(body)});
  if(!res.ok){const err=await res.json().catch(()=>({error:`HTTP ${res.status}`}));throw new Error(err.error||`HTTP ${res.status}`);}
  return res.json();
}

// Variabel observer dideklarasi di sini agar tidak ada masalah hoisting
var _thumbObserver = null;
function showContent(html){
  document.getElementById('mainContent').innerHTML=html;
  initLazyThumbs();
}
function initLazyThumbs(){
  if(_thumbObserver) _thumbObserver.disconnect();
  _thumbObserver = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(!entry.isIntersecting) return;
      var img = entry.target;
      var url = img.dataset.src;
      if(!url) return;
      _thumbObserver.unobserve(img);
      img.removeAttribute('data-src');
      img.src = url;
    });
  },{rootMargin:'300px'});
  document.querySelectorAll('img.lazy-thumb[data-src]').forEach(function(img){
    _thumbObserver.observe(img);
  });
}
function setStatus(msg){document.getElementById('headerStatus').textContent=msg;}
function showToast(msg,type='info'){
  const colors={success:'var(--success)',error:'var(--danger)',info:'var(--accent)'};
  const icons={success:'✓',error:'✕',info:'ℹ'};
  const el=document.createElement('div');el.className=`toast ${type}`;
  el.innerHTML=`<span style="color:${colors[type]};font-weight:700">${icons[type]}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(el);setTimeout(()=>el.remove(),3500);
}
function showModal(html,wide=false){
  closeModal();const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='currentModal';
  overlay.innerHTML=wide?html:`<div class="modal">${html}</div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  document.getElementById('modalContainer').appendChild(overlay);
}
function closeModal(){document.getElementById('currentModal')?.remove();}
function formatSize(bytes){if(!bytes)return'0 B';const k=1024,sizes=['B','KB','MB','GB'];const i=Math.floor(Math.log(bytes)/Math.log(k));return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+sizes[i];}
