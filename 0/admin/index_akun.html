<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Peserta — Tester</title>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<style>
:root {
    --primary: #667eea;
    --purple:  #764ba2;
    --success: #28a745;
    --danger:  #dc3545;
    --warning: #ffc107;
    --bg:      #f0f2ff;
    --card:    #ffffff;
    --text:    #1e293b;
    --muted:   #64748b;
    --border:  #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
    min-height: 100vh;
    padding: 0;
}

/* ── TOP NAV ── */
.topnav {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    height: 52px;
}
.topnav-brand {
    font-size: 15px;
    font-weight: 700;
    color: white;
    white-space: nowrap;
}
.topnav-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
}

/* ── MAIN ── */
.main { padding: 20px; max-width: 1400px; margin: 0 auto; }

/* ── CARD ── */
.card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    padding: 20px;
}
.card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--bg);
}
.card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
}

/* ── INFO BAR ── */
.info-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.info-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
}
.pill-blue   { background: #dbeafe; color: #1d4ed8; }
.pill-yellow { background: #fef3c7; color: #d97706; }
.pill-purple { background: #ede9fe; color: #6d28d9; }
.pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #28a745; flex-shrink: 0;
    animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── CONTROLS ── */
.controls-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
}
.ctrl-input {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
    background: white;
    color: var(--text);
}
.ctrl-input:focus { border-color: var(--primary); }

/* ── BUTTONS ── */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 18px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--purple)); color: white; box-shadow: 0 3px 10px rgba(102,126,234,.3); }
.btn-primary:hover { opacity: 0.9; }
.btn-warning { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; }
.btn-warning:hover { opacity: 0.9; }
.btn-outline { background: white; color: var(--muted); border: 2px solid var(--border); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── DATATABLES ── */
.dataTables_wrapper { overflow-x: auto; width: 100%; }
table.dataTable {
    width: 100% !important;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 500px;
    table-layout: auto;
}
table.dataTable thead th {
    background: linear-gradient(135deg, var(--primary), var(--purple));
    color: white; padding: 10px 8px; font-weight: 700;
    border: none; white-space: nowrap; font-size: 13px;
}
table.dataTable thead th, table.dataTable tbody td { white-space: nowrap; }
/* Biodata & Skor boleh wrap */
table.dataTable tbody td:nth-child(3),
table.dataTable tbody td:nth-child(4) { white-space: normal; vertical-align: top; }
table.dataTable tbody td {
    padding: 9px 8px;
    border-bottom: 1px solid #eef0f6;
    vertical-align: middle;
    font-size: 13px;
}
table.dataTable tbody tr:hover { background: #f5f7ff; }
table.dataTable tbody tr:nth-child(even) { background: #fafbff; }
.dataTables_wrapper .dataTables_filter input,
.dataTables_wrapper .dataTables_length select {
    border: 2px solid var(--border); border-radius: 8px;
    padding: 6px 10px; font-size: 13px; outline: none;
}
.dataTables_wrapper .dataTables_filter input:focus,
.dataTables_wrapper .dataTables_length select:focus { border-color: var(--primary); }
.dataTables_wrapper .dataTables_paginate .paginate_button {
    padding: 6px 12px; margin: 2px; border-radius: 8px;
    border: 1px solid var(--border); font-size: 12px;
}
.dataTables_wrapper .dataTables_paginate .paginate_button.current {
    background: linear-gradient(135deg, var(--primary), var(--purple));
    color: white !important; border: none;
}
.dataTables_wrapper .dataTables_info { font-size: 12px; }

/* ── STATUS BADGE ── */
.badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 99px;
    font-size: 11px; font-weight: 700;
}
.badge-active { background: #dbeafe; color: #1d4ed8; animation: pulse 2s infinite; }

/* ── TIMER ── */
.timer-live {
    display: inline-block; background: #fff3cd; color: #856404;
    border: 1.5px solid #ffc107; border-radius: 8px; padding: 3px 10px;
    font-weight: 700; font-size: 13px; font-family: 'Courier New', monospace;
    min-width: 72px; text-align: center;
}
.timer-live.danger { background: #f8d7da; color: #842029; border-color: #f5c2c7; animation: blink 1s infinite; }
.timer-live.done   { background: #d1e7dd; color: #0f5132; border-color: #badbcc; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── STATUS AKTIF (readonly) ── */
.status-aktif {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 99px;
    font-size: 12px; font-weight: 700;
}
.status-aktif.ya  { background: #dcfce7; color: #166534; border: 1.5px solid #86efac; }
.status-aktif.tdk { background: #fee2e2; color: #991b1b; border: 1.5px solid #fca5a5; }

/* ── LOADING ── */
.loading-block { text-align: center; padding: 50px 20px; color: var(--muted); }
.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid var(--primary);
    border-radius: 50%; width: 40px; height: 40px;
    animation: spin 1s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── EMPTY MSG ── */
.empty-msg { text-align: center; padding: 40px 20px; color: var(--muted); }
.em-icon { font-size: 36px; margin-bottom: 10px; }

/* ── TRUNCATE ── */
.truncate {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: block; cursor: default; max-width: 160px;
}

/* ── NOTE ── */
.note-bar {
    font-size: 12px; color: var(--muted);
    margin-bottom: 12px;
}

/* ── TOTAL ROW ── */
#totalRow td {
    background: linear-gradient(135deg, #ede9fe, #dbeafe) !important;
    font-weight: 700 !important;
    border-top: 2px solid var(--primary) !important;
}
.total-val { color: #1d4ed8; font-weight: 800; font-size: 13px; }

/* ── Server Switcher ── */
.srv-chip {
    padding: 4px 12px;
    border: 1.5px solid rgba(255,255,255,.35);
    border-radius: 99px;
    background: rgba(255,255,255,.1);
    color: rgba(255,255,255,.8);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
    font-family: inherit;
}
.srv-chip:hover:not(.active) {
    background: rgba(255,255,255,.22);
    color: white;
    border-color: rgba(255,255,255,.65);
}
.srv-chip.active {
    background: rgba(255,255,255,.28);
    color: white;
    border-color: white;
    box-shadow: 0 0 0 2px rgba(255,255,255,.15);
}
/* Login overlay server chips */
.srv-chip-login {
    padding: 5px 13px;
    border: 2px solid #c9baff;
    border-radius: 99px;
    background: #f4f0ff;
    color: #5F4EDA;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
}
.srv-chip-login:hover:not(.active) { background: #e8e0ff; border-color: #667eea; }
.srv-chip-login.active { background: linear-gradient(135deg,#667eea,#764ba2); color: white; border-color: #667eea; }
</style>
</head>
<body>

<!-- ══ LOGIN OVERLAY ══ -->
<div id="loginOverlay" style="
    position:fixed;inset:0;z-index:99999;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center;">
    <div style="font-size:2.8em;margin-bottom:10px;">👁</div>
    <div style="font-size:1.2em;font-weight:700;color:#1e293b;margin-bottom:4px;">Monitor Peserta</div>
    <div style="font-size:.85em;color:#64748b;margin-bottom:16px;">Masuk sebagai Tester</div>

    <!-- Server Switcher di login -->
    <div style="margin-bottom:20px;">
      <div style="font-size:.72em;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Server</div>
      <div id="loginSrvChips" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;"><!-- filled by JS --></div>
      <div id="loginSrvUrl" style="margin-top:8px;font-size:.7em;color:#a0aec0;font-family:'Courier New',monospace;word-break:break-all;"></div>
    </div>

    <div style="text-align:left;margin-bottom:14px;">
      <label style="font-size:.8em;font-weight:700;color:#64748b;display:block;margin-bottom:5px;">Username</label>
      <input id="loginUser" type="text" placeholder="Username" autocomplete="username"
        style="width:100%;padding:11px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:.95em;outline:none;font-family:inherit;transition:border .2s;"
        onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e2e8f0'"
        onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div style="text-align:left;margin-bottom:20px;">
      <label style="font-size:.8em;font-weight:700;color:#64748b;display:block;margin-bottom:5px;">Password</label>
      <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password"
        style="width:100%;padding:11px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:.95em;outline:none;font-family:inherit;transition:border .2s;"
        onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e2e8f0'"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <div id="loginErr" style="display:none;background:#fef2f2;border:1.5px solid #fecaca;color:#dc2626;border-radius:8px;padding:9px 12px;font-size:.83em;font-weight:600;margin-bottom:14px;"></div>

    <button onclick="doLogin()" id="loginBtn"
      style="width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:.95em;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;">
      Masuk
    </button>
  </div>
</div>

<!-- TOP NAV -->
<nav class="topnav">
    <div class="topnav-brand">👁 Monitor Peserta — Tester</div>
    <!-- Server chips topnav -->
    <div id="topnavSrvChips" style="display:flex;gap:5px;flex:1;padding:0 10px;overflow-x:auto;scrollbar-width:none;"><!-- filled by JS --></div>
    <div class="topnav-right">
        <div class="info-pill pill-blue" style="font-size:12px;">
            <span class="pulse-dot"></span>
            Auto-refresh 5 detik
        </div>
        <span class="info-pill pill-yellow" id="todayCount">0 peserta</span>
        <span class="info-pill pill-purple" id="todayLastUpdate">-</span>
        <button class="btn btn-outline btn-sm" onclick="doRefresh()">🔄 Refresh</button>
        <button class="btn btn-sm" onclick="doLogout()"
          style="background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:700;">
          🔒 Logout
        </button>
    </div>
</nav>

<div class="main">
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        📅 Peserta Aktif
        <span style="background:#fef3c7;color:#d97706;border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;" id="todayBadgeLabel">Hari Ini</span>
      </div>
      <div class="info-bar">
        <!-- kosong, info sudah di topnav -->
      </div>
    </div>

    <div class="controls-bar" style="display:none;">
      <label style="font-size:13px;font-weight:700;color:var(--muted)">Tabel:</label>
      <input type="text" class="ctrl-input" id="tableInput" value="nilai1_json" style="width:140px">
      <label style="font-size:13px;font-weight:700;color:var(--muted);margin-left:6px">Tanggal:</label>
      <input type="date" id="dateInput" style="padding:8px 12px;border:2px solid var(--border);border-radius:10px;font-size:14px;outline:none">
      <button class="btn btn-warning" onclick="loadTable()">🔍 Cari</button>
    </div>

    <p class="note-bar">
      💡 Peserta terdeteksi dari tanggal yang otomatis disimpan saat mengisi biodata.
    </p>

    <div id="todayContainer">
      <div class="loading-block"><div class="spinner"></div><p>Memuat data...</p></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// SERVER LIST — tambah / kurangi di sini saja
// ============================================================
const SERVERS = [
    { label: '1',     domain: 'lidan-co-id.pages.dev' },
    { label: '2',      domain: 'tabi.my.id'             },
    { label: '3',    domain: 'mobeli.my.id'           },
    { label: '4', domain: 'talentmap.my.id'        },
];
const API_PATH = '/api/contacts_filter_dinamis7';
let activeSrvIdx = 0;

// Getter dinamis — semua fetch pakai ini
function getApiBase() { return `https://${SERVERS[activeSrvIdx].domain}${API_PATH}`; }
Object.defineProperty(window, 'API_BASE', { get: getApiBase });

// ============================================================
// KONFIGURASI
// ============================================================
const AUTH_KEY = 'admin';

// ============================================================
// SERVER SWITCHER — render chips
// ============================================================
function renderSrvChips() {
    // Topnav chips
    const topWrap = document.getElementById('topnavSrvChips');
    if (topWrap) {
        topWrap.innerHTML = SERVERS.map((s, i) => `
            <button class="srv-chip${i === activeSrvIdx ? ' active' : ''}"
                onclick="switchSrcServer(${i})"
                title="https://${s.domain}">
                ${i === activeSrvIdx ? '✓ ' : ''}${s.label}
            </button>`).join('');
    }
    // Login overlay chips
    const loginWrap = document.getElementById('loginSrvChips');
    if (loginWrap) {
        loginWrap.innerHTML = SERVERS.map((s, i) => `
            <button class="srv-chip-login${i === activeSrvIdx ? ' active' : ''}"
                onclick="switchSrcServer(${i})"
                title="https://${s.domain}">
                ${i === activeSrvIdx ? '✓ ' : ''}${s.label}
            </button>`).join('');
    }
    // URL display di login
    const urlEl = document.getElementById('loginSrvUrl');
    if (urlEl) urlEl.textContent = getApiBase();
}

function switchSrcServer(idx) {
    if (idx === activeSrvIdx) return;
    activeSrvIdx = idx;
    renderSrvChips();
    // Reset cache & reload data jika sudah login
    lastHash = null;
    rawCache = [];
    if (testerTable) { testerTable.destroy(); testerTable = null; }
    document.getElementById('todayContainer').innerHTML =
        '<div class="loading-block"><div class="spinner"></div><p>Memuat dari server baru...</p></div>';
    update();
}

// Init chips saat halaman load
renderSrvChips();

// ============================================================
// STATE
// ============================================================
let testerTable    = null;
let testerInterval = null;
let rawCache       = [];
let lastHash       = null;
let tableName      = 'nilai1_json';

// ============================================================
// HELPERS
// ============================================================
function todayString() {
    const d = new Date();
    return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');
}

function nowTimeString() {
    return new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getDateFromX02(x02) {
    if (!x02) return '';
    try { return (JSON.parse(x02).tgl_tes || '').trim(); } catch(e) { return ''; }
}

function renderJsonBio(raw) {
    if (!raw || raw.trim() === '') return '<span style="color:#ccc;font-size:12px">—</span>';
    try {
        const obj  = JSON.parse(raw);
        const nama = obj.nama || '';
        const usia = obj.usia ? obj.usia + 'th' : '';
        const pend = obj.pendidikan || '';
        const jk   = obj.jenis_kelamin || '';
        const disp = [nama, usia, pend, jk].filter(Boolean).join(' · ');
        const full = Object.entries(obj).map(([k,v]) => `${k}: ${v}`).join(' | ');
        return `<span title="${escHtml(full)}" style="cursor:default">${escHtml(disp)}</span>`;
    } catch(e) { return escHtml(raw); }
}

function renderSkorField(raw) {
    if (!raw || raw.trim() === '') return '<span style="color:#ccc;font-size:12px">—</span>';
    try {
        const obj     = JSON.parse(raw);
        const entries = Object.entries(obj);
        if (entries.length === 0) return '<span style="color:#ccc;font-size:12px">—</span>';
        const tooltip = entries.map(([k,v]) => `${k}: ${v}`).join(' | ');
        const items   = entries.map(([k]) => {
            return `<span style="font-size:11px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:2px 6px;white-space:nowrap;flex:0 0 calc(25% - 3px);box-sizing:border-box;text-align:center"><span style="color:#1e40af;font-weight:700">${escHtml(k)}</span></span>`;
        }).join('');
        return `<div title="${escHtml(tooltip)}" style="display:flex;flex-wrap:wrap;gap:2px;width:240px;cursor:default">${items}</div>`;
    } catch(e) {
        return `<span style="font-size:11px;background:#eff6ff;border-radius:4px;padding:1px 6px;cursor:default">${escHtml(raw)}</span>`;
    }
}

function renderJsonField(raw) {
    if (!raw || raw.trim() === '') return '<span style="color:#ccc;font-size:12px">—</span>';
    try {
        const obj     = JSON.parse(raw);
        const entries = Object.entries(obj);
        if (entries.length === 0) return '<span style="color:#ccc;font-size:12px">—</span>';
        const items = entries.map(([k]) =>
            `<span style="font-size:11px;background:#f1f5f9;border-radius:4px;padding:2px 6px;white-space:nowrap;flex:0 0 calc(25% - 3px);box-sizing:border-box;text-align:center">${escHtml(k)}</span>`
        ).join('');
        const keyOnly = entries.map(([k]) => k).join(', ');
        return `<div title="${escHtml(keyOnly)}" style="display:flex;flex-wrap:wrap;gap:2px;width:240px;cursor:default">${items}</div>`;
    } catch(e) {
        const key = raw.split(':')[0].trim();
        return `<span title="${escHtml(raw)}" style="font-size:11px;background:#f1f5f9;border-radius:4px;padding:1px 6px;cursor:default">${escHtml(key)}</span>`;
    }
}

// ── renderTimer — hitung mundur murni lokal, 0 request D1 ──
// Format baru : "START:NamaSubtes:ISO:durasi_detik"
// Format lama : "NamaSubtes|COUNTDOWN:detik" (statis)
function renderTimer(x04Raw) {
    if (!x04Raw || x04Raw.trim() === '') return '<span style="color:#ccc;font-size:12px">—</span>';

    // ── Format baru: START:NamaSubtes:ISO:durasi ──
    if (x04Raw.startsWith('START:')) {
        const lastColon   = x04Raw.lastIndexOf(':');
        const durasi      = parseInt(x04Raw.substring(lastColon + 1));
        const firstColon  = x04Raw.indexOf(':');
        const secondColon = x04Raw.indexOf(':', firstColon + 1);
        const namaTest    = x04Raw.substring(firstColon + 1, secondColon);
        const isoStr      = x04Raw.substring(secondColon + 1, lastColon);
        const mulai       = new Date(isoStr);
        if (isNaN(mulai.getTime())) return '<span style="color:#ccc;font-size:12px">—</span>';

        if (!durasi || isNaN(durasi)) {
            const berlalu = Math.floor((new Date() - mulai) / 1000);
            return `<span class="timer-live stopwatch" title="${escHtml(namaTest)}">${berlalu}s</span>`;
        }

        const selesai = new Date(mulai.getTime() + durasi * 1000);
        const sisa    = Math.floor((selesai - new Date()) / 1000);
        if (sisa <= 0) return `<span class="timer-live done" title="${escHtml(namaTest)}">Habis</span>`;
        const cls = sisa <= 60 ? 'timer-live danger' : 'timer-live';
        return `<span class="${cls}" title="${escHtml(namaTest)} — selesai ${selesai.toLocaleTimeString('id-ID')}">${sisa}s</span>`;
    }

    // ── Format lama: NamaSubtes|COUNTDOWN:detik (statis) ──
    if (x04Raw.includes('|')) {
        const pipe     = x04Raw.indexOf('|');
        const namaTest = x04Raw.substring(0, pipe);
        const rest     = x04Raw.substring(pipe + 1);
        const colon    = rest.indexOf(':');
        const mode     = rest.substring(0, colon);
        const val      = parseInt(rest.substring(colon + 1));
        if (isNaN(val) || mode !== 'COUNTDOWN') return '<span style="color:#ccc;font-size:12px">—</span>';
        if (val <= 0) return `<span class="timer-live done" title="${escHtml(namaTest)}">Habis</span>`;
        const cls = val <= 60 ? 'timer-live danger' : 'timer-live';
        return `<span class="${cls}" title="${escHtml(namaTest)} (nilai statis)">${val}s</span>`;
    }

    return '<span style="color:#ccc;font-size:12px">—</span>';
}

function renderViolation(x09Raw) {
    if (!x09Raw || x09Raw.trim() === '') return '<span style="color:#ccc;font-size:12px">—</span>';
    let entries = [];
    try {
        entries = Object.entries(JSON.parse(x09Raw)).filter(([,v]) => v > 0);
    } catch(e) { return '<span style="color:#ccc;font-size:12px">—</span>'; }
    if (entries.length === 0) return '<span style="color:#ccc;font-size:12px">—</span>';
    const total   = entries.reduce((s,[,v]) => s + (parseInt(v)||0), 0);
    const tooltip = entries.map(([k,v]) => `${k}: ${v}x`).join(' | ');
    const summary = entries.map(([k,v]) => {
        const c = parseInt(v) >= 5 ? '#dc2626' : parseInt(v) >= 2 ? '#d97706' : '#16a34a';
        return `<span style="color:${c};font-weight:600">${k} ${v}x</span>`;
    }).join('<span style="color:#ccc"> · </span>');
    return `<div title="Total: ${total}x &#10;${tooltip}" style="cursor:default;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${summary}</div>`;
}

// Status aktif — readonly badge, tidak bisa diklik
function renderStatusAktif(x02Raw) {
    let status = 'nonaktif';
    try { status = JSON.parse(x02Raw || '{}').status || 'nonaktif'; } catch(e) {}
    return status === 'aktif'
        ? `<span class="status-aktif ya">✅ Aktif</span>`
        : `<span class="status-aktif tdk">⛔ Nonaktif</span>`;
}

function renderPaket(x02Raw) {
    if (!x02Raw) return '<span style="color:#ccc;font-size:12px">—</span>';
    try {
        const p = JSON.parse(x02Raw).paket_laporan || '';
        if (!p) return '<span style="color:#ccc;font-size:12px">—</span>';
        const colorMap = { 'Dasar':'#dbeafe;color:#1d4ed8', 'Lengkap':'#fef3c7;color:#d97706', 'Komprehensif':'#ede9fe;color:#6d28d9' };
        const style = colorMap[p] || '#f1f5f9;color:#334155';
        return `<span style="background:${style};padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;">${escHtml(p)}</span>`;
    } catch(e) { return '<span style="color:#ccc;font-size:12px">—</span>'; }
}

function parseHargaNum(x02Raw) {
    // Ambil angka dari string "Rp 85.000" → 85000
    if (!x02Raw) return 0;
    try {
        const h = JSON.parse(x02Raw).harga_laporan || '';
        return parseInt(h.replace(/[^0-9]/g, '')) || 0;
    } catch(e) { return 0; }
}

function renderStatusBayar(x02Raw) {
    const sudah = isSudahBayar(x02Raw);
    return sudah
        ? `<span style="background:#dcfce7;color:#166534;border:1.5px solid #86efac;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;">✅ Sudah Bayar</span>`
        : `<span style="background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;">⛔ Belum Bayar</span>`;
}

function isSudahBayar(x02Raw) {
    // Baca dari field "payment" di x_02 JSON
    // "done" = sudah bayar, "pending" atau tidak ada = belum bayar
    if (!x02Raw) return false;
    try {
        const obj = JSON.parse(x02Raw);
        return obj.payment === 'done';
    } catch(e) { return false; }
}

function renderInsentif(x02Raw) {
    if (!isSudahBayar(x02Raw)) return '<span style="color:#ccc;font-size:12px">—</span>';
    const num = parseHargaNum(x02Raw);
    if (!num) return '<span style="color:#ccc;font-size:12px">—</span>';
    const fee = Math.round(num * 0.1);
    return `<span style="font-weight:700;color:#92400e">Rp ${fee.toLocaleString('id-ID')}</span>`;
}
// ============================================================
async function fetchData() {
    const res  = await fetch(`${API_BASE}?table=${encodeURIComponent(tableName)}`, {
        headers: { 'X-Custom-Auth': AUTH_KEY }
    });
    const json = await res.json();
    return (json.success && json.data) ? json.data : [];
}

// ============================================================
// RENDER TABEL
// ============================================================
function buildRows(data) {
    const dateVal = document.getElementById('dateInput').value || todayString();
    return data
        .filter(row => getDateFromX02(row.x_02) === dateVal)
        .map(row => ({
            id_x:     String(row.id_x || ''),
            x_02:     renderJsonBio(row.x_02),
            x_05:     renderSkorField(row.x_05),
            x_04:     renderTimer(row.x_04 || ''),
            x_06:     renderJsonField(row.x_06),
            x_09:     renderViolation(row.x_09 || ''),
            tgl:      `<span style="font-size:12px;color:var(--muted)">${getDateFromX02(row.x_02)}</span>`,
            aktif:    renderStatusAktif(row.x_02),
            paket:     renderPaket(row.x_02),
            bayar:     renderStatusBayar(row.x_02),
            insentif:  renderInsentif(row.x_02),
            _hargaNum: parseHargaNum(row.x_02),
            _sudahBayar: isSudahBayar(row.x_02)
        }));
}

function initTable(rows) {
    const heads = `<th>ID</th><th>Biodata</th><th>Skor</th><th>⏱ Timer</th><th>Skor 1</th><th>🔄 Tab</th><th>Tgl Tes</th><th>Status</th><th>Paket</th><th>Sudah Bayar</th><th>Insentif (10%)</th>`;
    const cols  = [
        { data: 'id_x',     orderable: true },
        { data: 'x_02' },
        { data: 'x_05' },
        { data: 'x_04',     orderable: false },
        { data: 'x_06' },
        { data: 'x_09',     orderable: false, defaultContent: '—' },
        { data: 'tgl',      orderable: false },
        { data: 'aktif',    orderable: false },
        { data: 'paket',    orderable: false },
        { data: 'bayar',    orderable: false },
        { data: 'insentif', orderable: false }
    ];
    document.getElementById('todayContainer').innerHTML = `
        <table id="testerTable" class="display nowrap" style="width:100%">
            <thead><tr>${heads}</tr></thead><tbody></tbody>
            <tfoot><tr id="totalRow"></tr></tfoot>
        </table>`;
    testerTable = $('#testerTable').DataTable({
        data: rows,
        columns: cols,
        pageLength: 25,
        lengthMenu: [[10,25,50,100,-1],[10,25,50,100,'Semua']],
        order: [[0,'desc']],
        language: {
            search: '🔍', searchPlaceholder: 'Cari...',
            lengthMenu: 'Tampilkan _MENU_',
            info: '_START_–_END_ dari _TOTAL_',
            infoEmpty: '0 data', infoFiltered: '(dari _MAX_)',
            paginate: { first:'«', last:'»', next:'›', previous:'‹' },
            zeroRecords: 'Tidak ada data', emptyTable: 'Tidak ada data'
        },
        autoWidth: false,
        drawCallback: function() { updateTotalRow(rows); }
    });
    updateTotalRow(rows);
}

function updateTotalRow(rows) {
    const tr = document.getElementById('totalRow');
    if (!tr) return;
    const totalInsentif = rows.reduce((s, r) => s + (r._sudahBayar ? Math.round((r._hargaNum || 0) * 0.1) : 0), 0);
    const colCount = 11; // total kolom
    tr.innerHTML = `
        <td colspan="${colCount - 1}" style="text-align:right;font-size:12px;font-weight:700;color:var(--muted);padding:10px 8px;">
            TOTAL INSENTIF (${rows.filter(r => r._sudahBayar).length} sudah bayar)
        </td>
        <td style="padding:10px 8px;">
            <span class="total-val">Rp ${totalInsentif.toLocaleString('id-ID')}</span>
        </td>`;
}

// ============================================================
// UPDATE (dipanggil tiap 5 detik)
// ============================================================
async function update() {
    try {
        const data = await fetchData();
        const hash = JSON.stringify(data);

        document.getElementById('todayLastUpdate').textContent = '🕐 ' + nowTimeString();

        rawCache = data;
        const rows = buildRows(data);
        document.getElementById('todayCount').textContent = rows.length + ' peserta';

        if (hash === lastHash && testerTable) return; // tidak ada perubahan
        lastHash = hash;

        if (testerTable) {
            testerTable.clear();
            testerTable.rows.add(rows);
            testerTable.draw(false);
            updateTotalRow(rows);
        } else {
            if (rows.length === 0) {
                const dateVal = document.getElementById('dateInput').value || todayString();
                document.getElementById('todayContainer').innerHTML = `
                    <div class="empty-msg">
                        <div class="em-icon">📭</div>
                        <p>Tidak ada peserta pada <strong>${dateVal}</strong></p>
                    </div>`;
            } else {
                initTable(rows);
            }
        }
    } catch(e) {
        document.getElementById('todayLastUpdate').textContent = '⚠ Error';
    }
}

// ============================================================
// KONTROL
// ============================================================
function loadTable() {
    tableName = document.getElementById('tableInput').value.trim() || 'nilai1_json';
    lastHash  = null;
    rawCache  = [];
    if (testerTable) { testerTable.destroy(); testerTable = null; }
    document.getElementById('todayContainer').innerHTML =
        '<div class="loading-block"><div class="spinner"></div><p>Memuat...</p></div>';
    update();
}

async function doRefresh() {
    lastHash = null;
    await update();
}

// ============================================================
// LOGIN / LOGOUT
// ============================================================
const SESSION_KEY = 'ct_tester_session';

function showLoginErr(msg) {
    const el = document.getElementById('loginErr');
    el.textContent = msg;
    el.style.display = 'block';
}

async function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const btn  = document.getElementById('loginBtn');

    if (!user || !pass) { showLoginErr('Username dan password wajib diisi.'); return; }

    btn.textContent = '⏳ Memeriksa...';
    btn.disabled    = true;
    document.getElementById('loginErr').style.display = 'none';

    try {
        const res  = await fetch(
            `${API_BASE}?table=users&x_01_eq=${encodeURIComponent(user)}`,
            { headers: { 'X-Custom-Auth': AUTH_KEY } }
        );
        const json = await res.json();

        if (!json.success || !json.count || !json.data || !json.data.length) {
            showLoginErr('Username tidak ditemukan.');
            btn.textContent = 'Masuk'; btn.disabled = false; return;
        }

        const row   = Array.isArray(json.data) ? json.data[0] : json.data;
        const dbPwd = (row.x_02 || '').trim();

        if (dbPwd !== pass) {
            showLoginErr('Password salah.');
            btn.textContent = 'Masuk'; btn.disabled = false; return;
        }

        // Simpan sesi ke sessionStorage (hilang saat tab ditutup)
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ user, ts: Date.now() }));
        document.getElementById('loginOverlay').style.display = 'none';
        btn.textContent = 'Masuk'; btn.disabled = false;

        // Mulai auto-refresh setelah login
        startApp();

    } catch(e) {
        showLoginErr('Gagal terhubung ke server. Coba lagi.');
        btn.textContent = 'Masuk'; btn.disabled = false;
    }
}

function doLogout() {
    if (!confirm('Keluar dari sesi ini?')) return;
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
}

function checkSession() {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    try { return !!JSON.parse(raw).user; } catch(e) { return false; }
}

// ============================================================
// INIT
// ============================================================
document.getElementById('dateInput').value = todayString();

function startApp() {
    update();
    if (testerInterval) clearInterval(testerInterval);
    testerInterval = setInterval(update, 5000);
}

// Cek sesi — jika sudah login langsung mulai, jika belum tampilkan overlay login
if (checkSession()) {
    document.getElementById('loginOverlay').style.display = 'none';
    startApp();
}
// Jika belum login, overlay tetap tampil dan startApp dipanggil setelah doLogin() berhasil
</script>
